name: collaboration-policy

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: collaboration-policy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  collaboration-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Test the policy engine
        run: python3 -m unittest tools/test_civvis_collab.py tools/test_civvis_push_guard.py
      - name: Validate branch, ownership, overlap, and commits
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 tools/civvis_collab.py check-pr
