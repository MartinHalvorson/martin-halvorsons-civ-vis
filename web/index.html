<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Martin Halvorson's Civilization VIS</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { font: 13px/1.45 "Segoe UI", system-ui, sans-serif; background: #000;
         color: #e2e8ef; display: flex; height: 100vh; overflow: hidden; }
  #maparea { flex: 1; position: relative; overflow: hidden; }
  canvas { display: block; }
  #map { cursor: grab; width: 100%; height: 100%; }
  #side { width: 350px; min-width: 350px; background: linear-gradient(180deg,#0d1119,#000);
          padding: 10px; overflow-y: auto; border-left: 1px solid #222c3a; }
  h1 { font-size: 15px; margin-bottom: 6px; color: #f0c674; letter-spacing: 0.5px; }
  .sec { background: #1d2430cc; border: 1px solid #28303e; border-radius: 8px;
         padding: 8px 10px; margin-bottom: 8px; }
  .sec h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
            color: #8fa1b5; margin-bottom: 5px; }
  button { background: #2d3a4d; color: #dde3ea; border: 1px solid #40536b;
           border-radius: 5px; padding: 4px 9px; margin: 2px; cursor: pointer;
           font-size: 12px; transition: background .12s; }
  button:hover { background: #3d4f68; }
  button.primary { background: linear-gradient(180deg,#caa11c,#a07d0a); color: #14100a;
                   border-color: #daa520; font-weight: 700; width: 100%;
                   padding: 9px; font-size: 14px; }
  button.primary:hover { background: linear-gradient(180deg,#e0b62f,#b78f10); }
  .bar { background: #0d1117; border-radius: 3px; height: 9px; overflow: hidden; margin: 3px 0; }
  .bar div { height: 100%; }
  .chip { display: inline-block; width: 10px; height: 10px; border-radius: 5px; margin-right: 5px; }
  .row { display: flex; justify-content: space-between; padding: 1px 0; }
  select { background: #2d3a4d; color: #dde3ea; border: 1px solid #40536b;
           border-radius: 5px; padding: 3px; max-width: 100%; }
  .small { font-size: 11px; color: #8fa1b5; }
  .boost { color: #7fd4ff; }
  .mini { font-size: 10px; padding: 1px 6px; margin-left: 6px; }
  #topbar { position: absolute; top: 0; left: 0; right: 0; z-index: 5;
            background: linear-gradient(180deg,#10151dee,#10151d00);
            padding: 8px 14px; display: flex; gap: 18px; align-items: center;
            pointer-events: none; font-size: 13px; }
  #topbar b { color: #f0c674; }
  #zoomctl { position: absolute; top: 44px; left: 10px; z-index: 6;
             display: flex; flex-direction: column; gap: 4px; }
  #zoomctl button { width: 34px; height: 34px; font-size: 17px; padding: 0; }
  #ubar { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
          z-index: 6; background: #141a23ee; border: 1px solid #40536b;
          border-radius: 10px; padding: 8px 14px; display: none; text-align: center;
          box-shadow: 0 4px 18px #0009; }
  #modeline { position: absolute; bottom: 14px; left: 12px; background: #141a23cc;
              padding: 4px 10px; border-radius: 5px; font-size: 12px; z-index: 6;
              color: #f0c674; }
  #tip { position: fixed; pointer-events: none; background: #10151df2;
         border: 1px solid #40536b; border-radius: 7px; padding: 7px 11px;
         font-size: 12px; z-index: 20; display: none; max-width: 270px;
         line-height: 1.5; box-shadow: 0 3px 14px #000a; }
  #mini { position: absolute; right: 12px; bottom: 14px; z-index: 6;
          border: 1px solid #40536b; border-radius: 6px; background: #0a0e14;
          cursor: pointer; box-shadow: 0 3px 12px #0008; }
  #err { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
         color: #ff9090; background: #2a1418dd; border: 1px solid #6b3040;
         padding: 4px 12px; border-radius: 6px; z-index: 7; display: none;
         font-size: 12px; }
  #winner { position: absolute; top: 34%; left: 50%; transform: translate(-50%,-50%);
            background: #141a23f5; border: 2px solid #f0c674; border-radius: 12px;
            padding: 26px 44px; font-size: 21px; display: none; z-index: 8;
            text-align: center; box-shadow: 0 8px 40px #000c; }
  #tree { position: absolute; inset: 4% 3%; background: #141a23fa;
          border: 1px solid #40536b; border-radius: 10px; z-index: 10;
          display: none; flex-direction: column; padding: 12px; }
  #tree.open { display: flex; }
  #treehead { display: flex; justify-content: space-between; margin-bottom: 8px; }
  #treecols { display: flex; gap: 14px; overflow: auto; flex: 1; align-items: flex-start; }
  .tcol { display: flex; flex-direction: column; gap: 8px; min-width: 160px; }
  .tnode { background: #1e2530; border: 1px solid #40536b; border-radius: 6px;
           padding: 6px 8px; font-size: 12px; }
  .tnode.done { border-color: #50c878; color: #7fdc9c; }
  .tnode.cur { border-color: #7fd4ff; box-shadow: 0 0 6px #7fd4ff60; }
  .tnode.avail { border-color: #f0c674; cursor: pointer; }
  .tnode.avail:hover { background: #2d3a4d; }
  .tnode.locked { opacity: 0.45; }
  .tnode .req { color: #8fa1b5; font-size: 10px; }
</style>
</head>
<body>
<div id="maparea">
  <canvas id="map"></canvas>
  <div id="topbar"></div>
  <div id="zoomctl">
    <button id="zin" title="zoom in">+</button>
    <button id="zout" title="zoom out">−</button>
    <button id="zhome" title="center on your empire">⌂</button>
  </div>
  <div id="ubar"></div>
  <div id="modeline"></div>
  <div id="err"></div>
  <div id="winner"></div>
  <canvas id="mini" width="200" height="140"></canvas>
  <div id="tree">
    <div id="treehead"><b id="treetitle"></b>
      <button onclick='document.getElementById("tree").classList.remove("open")'>✕ close</button>
    </div>
    <div id="treecols"></div>
  </div>
  <div id="tip"></div>
</div>
<div id="side">
  <h1>CIVILIZATION VIS</h1>
  <div class="sec"><h2>Research <button class="mini" onclick='openTree("techs")'>tree map</button></h2><div id="research"></div></div>
  <div class="sec"><h2>Civics <button class="mini" onclick='openTree("civics")'>tree map</button></h2><div id="civics"></div></div>
  <div class="sec" id="govsec" style="display:none"><h2>Government</h2><div id="gov"></div></div>
  <div class="sec" id="citysec" style="display:none"><h2>City</h2><div id="citypanel"></div></div>
  <div class="sec"><h2>Players</h2><div id="players"></div></div>
  <button class="primary" id="endturn">End Turn (Enter)</button>
  <div id="specbar" style="display:none">
    <button class="primary" id="specpause">⏸ Pause (Enter)</button>
    <div class="sec" style="margin-top:8px"><h2>Watch speed</h2>
      <select id="specspeed">
        <option value="500">very fast (0.5s/turn)</option>
        <option value="1000">fast (1s/turn)</option>
        <option value="2000" selected>normal (2s/turn)</option>
        <option value="4000">slow (4s/turn)</option>
      </select>
    </div>
  </div>
  <div class="sec" style="margin-top:8px">
    <h2>Display</h2>
    <select id="viewsel">
      <option value="beautiful">beautiful</option>
      <option value="simple">simple</option>
      <option value="minimal">minimal (fastest)</option>
    </select>
    <div class="small">1 next unit · 2 settler lens · 3 tacks · drag pan · alt+drag rotate · wheel zoom · right-drag orders</div>
  </div>
  <div class="sec">
    <h2>New game</h2>
    players <select id="np"><option>2</option><option selected>4</option><option>6</option></select>
    <button id="newgame">Restart</button>
    <br><label class="small"><input type="checkbox" id="specchk"> AI-only (just watch)</label>
  </div>
</div>
<script>
"use strict";
// ---------------------------------------------------------------- constants
const S = 36, SQ3 = Math.sqrt(3);
const TERRAIN = { grassland:"#5e9440", plains:"#ab9e4e", desert:"#d8c184",
                  tundra:"#98a089", snow:"#e8eef2", coast:"#20647e",
                  ocean:"#0e3752", mountain:"#877f6f" };
const TERRAIN_HI = { grassland:"#79ad52", plains:"#c1b360", desert:"#e8d49c",
                     tundra:"#aab29a", snow:"#f6fafc", coast:"#2f7d99",
                     ocean:"#174a6b", mountain:"#9c9484" };
const PARCH = "#c7b58a", PARCH_GRID = "#8a795533", PARCH_INK = "#6d5c3a";
const FEAT_ICON = { forest:"🌲", jungle:"🌴", marsh:"🌾", oasis:"🏝" };
const RES_ICON = { wheat:"🌾", cattle:"🐄", sheep:"🐑", stone:"🪨", deer:"🦌",
                   fish:"🐟", bananas:"🍌", horses:"🐎", iron:"⚒️", silk:"🧵",
                   wine:"🍷", salt:"🧂" };
const UNIT_ICON = { settler:"🏳", builder:"🔨", scout:"👁", warrior:"⚔",
                    slinger:"🪃", archer:"🏹", spearman:"↑", swordsman:"⚔",
                    horseman:"🐎", catapult:"☄", crossbowman:"🏹", pikeman:"↑",
                    knight:"♞", musketman:"⁋", galley:"⛵" };
const DISTRICT_COLOR = { campus:"#4aa3df", holy_site:"#e8e4ef", commercial_hub:"#e2c04a",
                         harbor:"#5ec8d8", encampment:"#c0392b", theater_square:"#c678dd",
                         industrial_zone:"#e67e22", entertainment_complex:"#e75480" };
const YICON = { food:"🍞", production:"⚙️", gold:"🪙", science:"🔬",
                culture:"🎭", faith:"✡" };
const PCOLORS = ["#ffd700","#e05050","#50a0e0","#50c878","#c878e0","#e09050",
                 "#70d0d0","#f0f080","#a0a0ff","#ffa0c0","#80e080","#d0b080"];
const EDGE_CORNERS = [[0,1],[5,0],[4,5],[3,4],[2,3],[1,2]]; // matches DIRS order
const DIRS = [[1,0],[1,-1],[0,-1],[-1,0],[-1,1],[0,1]];
// ---------------------------------------------------------------- state
let state = null, sel = null, selCity = null, RULES = null;
let lensOn = false, tackMode = false, tacks = [], lastSeed = null, cycleIdx = -1;
let SPEC = false, specPaused = false, specTimer = null;
let TMAP = new Map();
let VIEW = localStorage.getItem("civvis-view") || "beautiful";
const cam = { x: 0, y: 0, scale: 1 };
const cv = document.getElementById("map"), cx = cv.getContext("2d");
const mini = document.getElementById("mini"), mx2 = mini.getContext("2d");
const area = document.getElementById("maparea");
let DPR = window.devicePixelRatio || 1;

const YS = 0.80;        // vertical squash: tilted-camera dimetric projection
const SKIRT = 9;        // extra prism depth below each tile
function key(p) { return p[0] + "," + p[1]; }
function pcol(id) { const p = state.players[id]; return p && p.is_barbarian ? "#30262a" : PCOLORS[id % PCOLORS.length]; }
function WW() { return state ? S * SQ3 * state.map.width : 1e12; }
function wrapX(x) { const w = WW(); return x + Math.round((cam.x - x) / w) * w; }
function canonPos(p) {
  if (!state) return p;
  const w = state.map.width;
  const col = p[0] + ((p[1] - (p[1] & 1)) >> 1);
  const m = ((col % w) + w) % w;
  return [p[0] + (m - col), p[1]];
}
function nbrTile(pos, d) {
  return TMAP.get(key(canonPos([pos[0] + d[0], pos[1] + d[1]])));
}
function whexDist(a, b) {
  if (!state) return hexDist(a, b);
  const w = state.map.width;
  return Math.min(hexDist(a, b), hexDist([a[0]-w, a[1]], b), hexDist([a[0]+w, a[1]], b));
}
// --- rotating 3D camera: yaw about the camera point, world-fixed sun ---
let COSR = 1, SINR = 0, LITF = 1;
const SUN = Math.PI * 1.25; // world azimuth of the light (upper-left)
function setRot(r) {
  cam.rot = r; COSR = Math.cos(r); SINR = Math.sin(r);
  LITF = COSR >= 0 ? 1 : -1;
  localStorage.setItem("civvis-rot", String(r));
}
// world is an east-west cylinder: x is always the copy nearest the camera.
// hexXY returns camera-relative view coords (rotate, then dimetric squash).
function hexXY(q, r) {
  const wx = wrapX(S * SQ3 * (q + r / 2)) - cam.x;
  const wy = S * 1.5 * r - cam.y;
  return [COSR * wx - SINR * wy, (SINR * wx + COSR * wy) * YS];
}
function elev(t) {
  if (VIEW !== "beautiful") return 0;
  if (t.terrain === "ocean") return -6;
  if (t.terrain === "coast") return -4;
  let e = 7;
  if (t.hills) e += 6;
  if (t.terrain === "mountain") e += 9;
  return e;
}
function corner(x, y, s, i) {
  const a = Math.PI / 180 * (60 * i - 30) + cam.rot;
  return [x + s * Math.cos(a), y + s * Math.sin(a) * YS];
}
function hexDist(a, b) {
  const dq = a[0]-b[0], dr = a[1]-b[1];
  return Math.max(Math.abs(dq), Math.abs(dr), Math.abs(dq+dr));
}
function hash2(q, r) { let h = (q * 374761393 + r * 668265263) | 0;
  h = (h ^ (h >> 13)) * 1274126177; return ((h ^ (h >> 16)) >>> 0) / 4294967295; }

function resize() {
  DPR = window.devicePixelRatio || 1;   // native-resolution backing store (4K crisp)
  cv.width = area.clientWidth * DPR; cv.height = area.clientHeight * DPR;
  mini.width = 200 * DPR; mini.height = 140 * DPR;
  mini.style.width = "200px"; mini.style.height = "140px";
  draw(); if (state) drawMini();
}
window.addEventListener("resize", resize);

function screenToWorld(sx, sy) {
  const vx = (sx - area.clientWidth / 2) / cam.scale;
  const vy = (sy - area.clientHeight / 2) / cam.scale / YS;
  return [COSR * vx + SINR * vy + cam.x, -SINR * vx + COSR * vy + cam.y];
}
function axialRound(wx, wy) {
  const rf = wy / (1.5 * S);
  const qf = wx / (S * SQ3) - rf / 2;
  let x = qf, z = rf, y = -x - z;
  let rx = Math.round(x), ry = Math.round(y), rz = Math.round(z);
  const dx = Math.abs(rx-x), dy = Math.abs(ry-y), dz = Math.abs(rz-z);
  if (dx > dy && dx > dz) rx = -ry - rz;
  else if (dy > dz) ry = -rx - rz;
  else rz = -rx - ry;
  return [rx, rz];
}
function pixelToHex(sx, sy) {
  const [wx, wy] = screenToWorld(sx, sy);
  // tiles are drawn raised by their elevation: test a few offsets and accept
  // the candidate whose actual elevation matches the offset best
  let best = null, bd = 1e9;
  for (const off of [0, 7, 13, 16, -5]) {
    const [ox2, oy2] = screenToWorld(sx, sy + off * cam.scale);
    const pos = canonPos(axialRound(ox2, oy2));
    const t = TMAP.get(key(pos));
    if (!t) continue;
    const d = Math.abs(elev(t) - off);
    if (d < bd) { bd = d; best = pos; }
  }
  return best;
}

// ---------------------------------------------------------------- net
async function fetchJSON(url, opts) { return await (await fetch(url, opts)).json(); }
let firstLoad = true;
async function boot() {
  RULES = await fetchJSON("/rules");
  render(await fetchJSON("/state"));
  if (firstLoad) {
    firstLoad = false; centerHome();
    document.getElementById("specchk").checked = SPEC;
    scheduleSpec(state);
  }
}
async function send(action) {
  if (SPEC) return;
  render(await fetchJSON("/action", { method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({action}) }));
}

// --- spectator auto-step: one AI player's turn per tick
async function specStep() {
  if (!SPEC || specPaused) return;
  const st = await fetchJSON("/step", { method: "POST" });
  render(st);
  scheduleSpec(st);
}
function scheduleSpec(st) {
  clearTimeout(specTimer);
  if (!SPEC || specPaused) return;
  if (st && st.winner !== null && st.winner !== undefined) return;
  let d = +document.getElementById("specspeed").value;
  if (st && st.stepped !== undefined) {
    const p = st.players[st.stepped];
    // minors/barbarians get a quick beat, majors the full watch delay
    if (p && (p.is_minor || p.is_barbarian)) d = Math.max(250, d / 4);
  }
  specTimer = setTimeout(specStep, d);
}
function legalFor(type) { return state.legal_actions.filter(a => a.type === type); }

function render(st) {
  state = st;
  SPEC = !!st.spectate;
  document.getElementById("endturn").style.display = SPEC ? "none" : "block";
  document.getElementById("specbar").style.display = SPEC ? "block" : "none";
  if (st.seed !== undefined && st.seed !== lastSeed) { lastSeed = st.seed; loadTacks(); }
  if (SPEC) { sel = null; selCity = null; }
  if (sel) sel = st.units.find(u => u.id === sel.id && u.owner === 0) || null;
  TMAP = new Map(st.map.tiles.map(t => [key(t.pos), t]));
  const errEl = document.getElementById("err");
  if (st.error) { errEl.textContent = st.error; errEl.style.display = "block";
    setTimeout(() => errEl.style.display = "none", 2500); }
  const w = document.getElementById("winner");
  if (st.winner !== null && st.winner !== undefined) {
    const p = st.players[st.winner];
    w.style.display = "block";
    w.innerHTML = (SPEC ? "🏆 " + p.civ + " wins!" : st.winner === 0 ? "🏆 Victory!" : "💀 Defeat") +
      "<br><span class='small'>" + p.civ + " wins by " + st.victory_type +
      " on turn " + st.turn + "</span>";
  } else w.style.display = "none";
  draw(); drawSide(); drawMini(); drawTopbar(); drawUbar();
}

// ---------------------------------------------------------------- renderer
function hexPath(x, y, s) {
  s = s || S;
  cx.beginPath();
  for (let i = 0; i < 6; i++) {
    const [px, py] = corner(x, y, s, i);
    i ? cx.lineTo(px, py) : cx.moveTo(px, py);
  }
  cx.closePath();
}
// prism side walls: true 3D behavior — an edge's wall is drawn only when it
// faces the viewer, and its brightness comes from the world-fixed sun, so
// faces light up and fall into shadow as the camera rotates.
function drawWalls(x, ytop, baseColor, depth) {
  for (let i = 0; i < 6; i++) {
    const aw = Math.PI / 180 * (60 * i);      // world-space outward normal
    if (Math.sin(aw + cam.rot) <= 0.12) continue;  // back-facing this frame
    const f = 0.46 + 0.32 * Math.max(0, Math.cos(aw - SUN));
    const [ax, ay] = corner(x, ytop, S + 0.6, i);
    const [bx, by] = corner(x, ytop, S + 0.6, i + 1);
    cx.fillStyle = shade(baseColor, f);
    cx.beginPath();
    cx.moveTo(ax, ay); cx.lineTo(bx, by);
    cx.lineTo(bx, by + depth); cx.lineTo(ax, ay + depth);
    cx.closePath(); cx.fill();
  }
}
function shade(hex, f) {
  const n = parseInt(hex.slice(1), 16);
  let r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  r = Math.min(255, Math.max(0, Math.round(r * f)));
  g = Math.min(255, Math.max(0, Math.round(g * f)));
  b = Math.min(255, Math.max(0, Math.round(b * f)));
  return "rgb(" + r + "," + g + "," + b + ")";
}

function tri(ax, ay, bx, by, ccx, ccy) {
  cx.beginPath(); cx.moveTo(ax, ay); cx.lineTo(bx, by); cx.lineTo(ccx, ccy);
  cx.closePath(); cx.fill();
}

// Civ 6-style warm rocky ranges: jagged multi-peak ridges that visually
// connect to neighboring mountain tiles, snow only on the tallest crests.
function drawMountainRange(t, x, y) {
  const base = y + 10;
  const mE = (nbrTile(t.pos, [1, 0]) || {}).terrain === "mountain";
  const mW = (nbrTile(t.pos, [-1, 0]) || {}).terrain === "mountain";
  const L = mW ? -S * 0.95 : -16, R = mE ? S * 0.95 : 16;
  const peaks = [];
  for (let i = 0; i < 4; i++) {
    const fx = L + (i + 0.5) / 4 * (R - L) + (hash2(t.pos[0] * 3 + i, t.pos[1]) - 0.5) * 7;
    const h = 11 + hash2(t.pos[0], t.pos[1] * 5 + i) * 13 + ((i === 1 || i === 2) ? 7 : 0);
    peaks.push([fx, h]);
  }
  // hazy back ridge
  cx.fillStyle = "#8a7d68";
  cx.beginPath(); cx.moveTo(x + L + 4, base - 3);
  for (const [fx, h] of peaks) cx.lineTo(x + fx * 0.9 + 3, base - 3 - h * 0.7);
  cx.lineTo(x + R - 4, base - 3); cx.closePath(); cx.fill();
  // main crests: sunlit faces track the world-fixed sun as the view rotates
  for (const [fx, h] of peaks) {
    const px = x + fx, pw = 8 + h * 0.6;
    cx.fillStyle = "#a8916a";
    tri(px - pw * LITF, base, px, base - h, px, base);
    cx.fillStyle = "#5f5039";
    tri(px, base - h, px + pw * 0.85 * LITF, base, px, base);
    if (h > 21) {
      const s = h * 0.32;
      cx.fillStyle = "#eef2f6";
      tri(px - pw * s / h * LITF, base - h + s, px, base - h,
          px + pw * 0.85 * s / h * LITF, base - h + s);
    }
  }
  // rock-fall shadow at the foot
  cx.fillStyle = "#00000024";
  cx.beginPath(); cx.ellipse(x, base + 2, (R - L) * 0.42, 3.5, 0, 0, 7); cx.fill();
}

function drawConifer(tx, ty, s, hv) {
  const th = 11 * s, tw = 4.6 * s;
  cx.fillStyle = "#00000028";
  cx.beginPath(); cx.ellipse(tx + 1, ty + 1, tw, 1.6 * s, 0, 0, 7); cx.fill();
  cx.fillStyle = "#3d2c1e";
  cx.fillRect(tx - 0.8 * s, ty - 2 * s, 1.6 * s, 3 * s);
  const g = ["#1d4423", "#25552b", "#2e6634"][Math.floor(hv * 2.99)];
  const lit = shade(g, 1.4);
  for (const [yo, w, hh] of [[0, tw, th * 0.62], [-th * 0.42, tw * 0.72, th * 0.55]]) {
    cx.fillStyle = lit;
    tri(tx - w * LITF, ty + yo, tx, ty + yo - hh, tx, ty + yo);
    cx.fillStyle = g;
    tri(tx, ty + yo - hh, tx + w * LITF, ty + yo, tx, ty + yo);
  }
}

function drawJungleTree(tx, ty, s, hv) {
  const g = ["#17603a", "#1d7044", "#14522f"][Math.floor(hv * 2.99)];
  cx.fillStyle = "#00000028";
  cx.beginPath(); cx.ellipse(tx + 1, ty + 2, 6 * s, 2 * s, 0, 0, 7); cx.fill();
  cx.fillStyle = "#3d2c1e";
  cx.fillRect(tx - 0.9 * s, ty - 3 * s, 1.8 * s, 4 * s);
  cx.fillStyle = g;
  cx.beginPath();
  cx.arc(tx - 3 * s, ty - 5 * s, 3.6 * s, 0, 7);
  cx.arc(tx + 2.5 * s, ty - 6 * s, 4.2 * s, 0, 7);
  cx.arc(tx, ty - 3.5 * s, 3.4 * s, 0, 7);
  cx.fill();
  cx.fillStyle = shade(g, 1.32);
  cx.beginPath(); cx.arc(tx - 1.5 * s * LITF, ty - 7 * s, 2.6 * s, 0, 7); cx.fill();
}

function draw() {
  if (!state) return;
  const beau0 = VIEW === "beautiful";
  cx.setTransform(1, 0, 0, 1, 0, 0);
  cx.fillStyle = beau0 ? "#a08d64" : "#0a0e14";
  cx.fillRect(0, 0, cv.width, cv.height);
  cx.setTransform(DPR * cam.scale, 0, 0, DPR * cam.scale,
    DPR * area.clientWidth / 2, DPR * area.clientHeight / 2);
  // --- antique-map parchment for the unexplored world
  if (beau0 && state) {
    cx.textAlign = "center"; cx.textBaseline = "middle";
    for (let row = 0; row < state.map.height; row++) {
      for (let col = 0; col < state.map.width; col++) {
        const q = col - ((row - (row & 1)) >> 1);
        if (TMAP.has(q + "," + row)) continue;
        const [x, y] = hexXY(q, row);
        hexPath(x, y, S + 0.6);
        cx.fillStyle = shade(PARCH, 0.96 + 0.08 * hash2(q, row));
        cx.fill();
        cx.strokeStyle = PARCH_GRID; cx.lineWidth = 1.2; cx.stroke();
        const h = hash2(q * 7 + 3, row * 5 + 1);
        if (h > 0.965) { // sparse hand-drawn flourishes
          cx.strokeStyle = PARCH_INK; cx.globalAlpha = 0.28; cx.lineWidth = 1.3;
          if (h > 0.988) { // little sea-serpent curl
            cx.beginPath();
            cx.arc(x, y, 7, 0.3, 4.2); cx.arc(x + 4, y - 2, 3.4, 3.6, 6.9);
            cx.stroke();
          } else { // hatch marks
            cx.beginPath();
            for (let i = -1; i <= 1; i++) {
              cx.moveTo(x - 6 + i * 5, y + 4); cx.lineTo(x - 1 + i * 5, y - 4);
            }
            cx.stroke();
          }
          cx.globalAlpha = 1;
        }
      }
    }
  }
  // painter's order by view depth (changes as the camera rotates)
  const tiles = [...state.map.tiles].sort((a, b) =>
    hexXY(a.pos[0], a.pos[1])[1] - hexXY(b.pos[0], b.pos[1])[1]);
  const visSet = new Set(state.visible.map(key));
  const campSet = new Set(state.camps.map(key));
  const beau = VIEW === "beautiful", minim = VIEW === "minimal";
  const hl = {};
  if (sel) {
    for (const p of (sel.reachable || [])) hl[key(p)] = 1;
    for (const a of state.legal_actions)
      if (a.unit === sel.id && (a.type === "attack" || a.type === "ranged"))
        hl[key(a.target)] = 2;
  }
  // --- terrain prisms (painted back-to-front for 3D)
  for (const t of tiles) {
    const [x, y0] = hexXY(t.pos[0], t.pos[1]);
    const e = elev(t);
    const y = y0 - e;
    const base = TERRAIN[t.terrain] || "#333";
    const water = (t.terrain === "coast" || t.terrain === "ocean");
    if (beau && !water) drawWalls(x, y, base, e + SKIRT);
    hexPath(x, y, S + 0.6);
    if (beau) {
      const j = 0.94 + 0.12 * hash2(t.pos[0], t.pos[1]);
      const g = cx.createLinearGradient(x, y - S, x, y + S);
      g.addColorStop(0, shade(TERRAIN_HI[t.terrain] || base, j));
      g.addColorStop(1, shade(base, j * 0.92));
      cx.fillStyle = g;
    } else {
      cx.fillStyle = base;
    }
    cx.fill();
    if (beau && water) { // waves + specular glints (deep OLED water)
      const ph = hash2(t.pos[0], t.pos[1]);
      cx.strokeStyle = "#9fd8ef22"; cx.lineWidth = 1.4;
      cx.beginPath();
      cx.arc(x - 6 + ph * 8, y - 3, 6, Math.PI * 0.15, Math.PI * 0.85);
      cx.arc(x + 4 - ph * 6, y + 7, 5, Math.PI * 0.15, Math.PI * 0.85);
      cx.stroke();
      if (ph > 0.6) {
        cx.fillStyle = "#bfe8ff2e";
        cx.beginPath();
        cx.ellipse(x - 10 + ph * 16, y - 8 + ph * 6, 2.4, 0.9, 0, 0, 7);
        cx.fill();
      }
    }
    if (!beau) { hexPath(x, y); cx.strokeStyle = "#00000038"; cx.lineWidth = 1; cx.stroke(); }
  }
  // --- rivers (drawn tile-to-tile toward neighboring river/water)
  cx.strokeStyle = "#5b93b8"; cx.lineWidth = 4; cx.lineCap = "round";
  cx.globalAlpha = 0.8;
  for (const t of tiles) {
    if (!t.river) continue;
    const [x, yy] = hexXY(t.pos[0], t.pos[1]);
    const y = yy - elev(t);
    let drew = false;
    for (const d of DIRS) {
      const n = nbrTile(t.pos, d);
      if (!n || !(n.river || n.terrain === "coast" || n.terrain === "ocean")) continue;
      let [nx, nyy] = hexXY(n.pos[0], n.pos[1]);
      nx = nx + Math.round((x - nx) / WW()) * WW(); // stay on this side of the seam
      const ny = nyy - elev(n);
      cx.beginPath(); cx.moveTo(x, y);
      cx.lineTo((x + nx) / 2, (y + ny) / 2); cx.stroke();
      drew = true;
    }
    if (!drew) { cx.beginPath(); cx.arc(x, y, 3, 0, 7); cx.stroke(); }
  }
  cx.globalAlpha = 1; cx.lineCap = "butt";
  // --- territory borders: ribbon along edges facing a different owner
  for (const t of tiles) {
    if (t.owner === null || t.owner === undefined) continue;
    const [x, yy] = hexXY(t.pos[0], t.pos[1]);
    const y = yy - elev(t);
    for (let i = 0; i < 6; i++) {
      const n = nbrTile(t.pos, DIRS[i]);
      if (n && n.owner === t.owner) continue;
      const [c1, c2] = EDGE_CORNERS[i];
      const [ax, ay] = corner(x, y, S - 1.5, c1);
      const [bx, by] = corner(x, y, S - 1.5, c2);
      cx.strokeStyle = pcol(t.owner); cx.lineWidth = 4.5; cx.globalAlpha = 0.55;
      cx.beginPath(); cx.moveTo(ax, ay); cx.lineTo(bx, by); cx.stroke();
      cx.lineWidth = 1.6; cx.globalAlpha = 1;
      cx.beginPath(); cx.moveTo(ax, ay); cx.lineTo(bx, by); cx.stroke();
    }
  }
  // --- decorations
  cx.textAlign = "center"; cx.textBaseline = "middle";
  for (const t of tiles) {
    const [x, yy] = hexXY(t.pos[0], t.pos[1]);
    const y = yy - elev(t);
    const k = key(t.pos);
    if (t.terrain === "mountain") {
      if (beau) {
        drawMountainRange(t, x, y);
      } else {
        cx.fillStyle = "#6f747c";
        tri(x - 13, y + 9, x - 3, y - 11, x + 5, y + 9);
        cx.fillStyle = "#555a61";
        tri(x - 1, y + 9, x + 7, y - 5, x + 14, y + 9);
      }
      continue;
    }
    if (minim) {
      if (t.district) { cx.fillStyle = DISTRICT_COLOR[t.district] || "#ddd";
        cx.fillRect(x - 5, y - 4, 10, 8); }
      continue;
    }
    if (t.hills && beau) {
      // soft rolling rises in the terrain's own color (Civ 6 style)
      const base = TERRAIN[t.terrain] || "#888";
      for (const [hx, hy, hw2, hh2] of [[-7, -3, 9.5, 5.5], [5, -6, 8.5, 5], [1, 3, 10.5, 6]]) {
        cx.fillStyle = shade(base, 0.86);
        cx.beginPath(); cx.ellipse(x + hx, y + hy + 1.6, hw2, hh2, 0, Math.PI, 0);
        cx.fill();
        cx.fillStyle = shade(base, 1.16);
        cx.beginPath(); cx.ellipse(x + hx, y + hy, hw2, hh2, 0, Math.PI, 0);
        cx.fill();
        cx.fillStyle = shade(base, 1.34);
        cx.beginPath(); cx.ellipse(x + hx - 1.5 * LITF, y + hy - 0.8,
                                   hw2 * 0.5, hh2 * 0.45, 0, Math.PI, 0);
        cx.fill();
      }
    } else if (t.hills) {
      cx.strokeStyle = "#00000055"; cx.lineWidth = 1.8;
      cx.beginPath(); cx.arc(x - 6, y - 7, 5, Math.PI, 0);
      cx.arc(x + 5, y - 7, 5, Math.PI, 0); cx.stroke();
    }
    if (t.terrain === "desert" && !t.feature && beau) {
      // dune ridges: light crest over shadow
      cx.lineWidth = 1.6;
      for (const [dx2, dy2, r2] of [[-5, 3, 9], [7, -4, 7]]) {
        cx.strokeStyle = "#00000022";
        cx.beginPath(); cx.arc(x + dx2, y + dy2 + 1.2, r2, Math.PI * 1.15, Math.PI * 1.85);
        cx.stroke();
        cx.strokeStyle = "#fff3d455";
        cx.beginPath(); cx.arc(x + dx2, y + dy2, r2, Math.PI * 1.15, Math.PI * 1.85);
        cx.stroke();
      }
    }
    if (t.feature === "forest" || t.feature === "jungle") {
      const jungle = t.feature === "jungle";
      if (beau) {
        // dense cluster of small individual trees (Civ 6 woods)
        const trees = [];
        for (let i = 0; i < 7; i++) {
          const h1 = hash2(t.pos[0] * 5 + i * 3, t.pos[1] * 7 + i);
          const h2 = hash2(t.pos[0] + i * 11, t.pos[1] * 3 + i * 5);
          trees.push([x + (h1 - 0.5) * S * 1.25,
                      y + (h2 - 0.5) * S * 0.8 + 4,
                      0.7 + h1 * 0.55, h2]);
        }
        trees.sort((a, b) => a[1] - b[1]);
        for (const [tx, ty, sc, hv] of trees) {
          if (jungle) drawJungleTree(tx, ty, sc, hv);
          else drawConifer(tx, ty, sc, hv);
        }
      } else {
        for (let i = 0; i < 3; i++) {
          const hsh = hash2(t.pos[0] * 3 + i, t.pos[1] + i * 7);
          const ang = hsh * 6.28;
          const tx = x + Math.cos(ang) * 9, ty = y + Math.sin(ang) * 6 + 5;
          cx.fillStyle = jungle ? "#1d5c33" : "#1e4d24";
          tri(tx - 5, ty, tx, ty - 11, tx + 5, ty);
        }
      }
    } else if (t.feature === "marsh") {
      cx.strokeStyle = "#2c6b4f"; cx.lineWidth = 1.5;
      for (let i = -1; i <= 1; i++) { cx.beginPath();
        cx.moveTo(x + i * 7, y + 8); cx.lineTo(x + i * 7, y - 1); cx.stroke(); }
    } else if (t.feature === "oasis") {
      cx.fillStyle = "#3d7aa6"; cx.beginPath();
      cx.ellipse(x, y + 3, 7, 4.5, 0, 0, 7); cx.fill();
      cx.font = "10px sans-serif"; cx.fillText("🌴", x + 6, y - 4);
    }
    if (t.improvement === "barbarian_camp" || campSet.has(k)) {
      cx.font = "15px sans-serif"; cx.fillText("⛺", x, y);
    } else if (t.improvement === "farm") {
      cx.strokeStyle = "#e8d98055"; cx.lineWidth = 2;
      for (let i = -1; i <= 1; i++) { cx.beginPath();
        cx.moveTo(x - 8, y + i * 4 + 2); cx.lineTo(x + 8, y + i * 4 + 2); cx.stroke(); }
    } else if (t.improvement === "mine") {
      cx.font = "11px sans-serif"; cx.fillText("⛏", x, y + 6);
    } else if (t.improvement) {
      cx.fillStyle = "#5a4632"; cx.fillRect(x - 4, y + 5, 8, 5);
    }
    if (t.resource) {
      // Civ 6-style white-ringed resource badge
      cx.fillStyle = "#1d2418c8";
      cx.beginPath(); cx.arc(x + 10, y + 9, 7.5, 0, 7); cx.fill();
      cx.strokeStyle = "#f6f2e4d8"; cx.lineWidth = 1.6; cx.stroke();
      cx.font = "9.5px sans-serif";
      cx.fillText(RES_ICON[t.resource] || "●", x + 10, y + 9.5);
    }
    if (t.district) {
      cx.fillStyle = DISTRICT_COLOR[t.district] || "#ddd";
      cx.strokeStyle = "#10151d"; cx.lineWidth = 1.4;
      cx.beginPath(); cx.roundRect(x - 8, y - 6, 16, 12, 3); cx.fill(); cx.stroke();
      cx.fillStyle = "#10151d"; cx.font = "bold 9px sans-serif";
      cx.fillText(t.district[0].toUpperCase(), x, y + 0.5);
    }
  }
  // --- settler lens
  if (lensOn) {
    const vals = [];
    for (const t of tiles) if (validSettle(t)) vals.push([t.pos, settleValue(t.pos)]);
    const mxv = Math.max(1, ...vals.map(v => v[1]));
    for (const [p2, v] of vals) {
      const t2 = TMAP.get(key(p2));
      const [x, yy] = hexXY(p2[0], p2[1]);
      const y = yy - (t2 ? elev(t2) : 0);
      hexPath(x, y);
      cx.fillStyle = `rgba(80,255,120,${(0.12 + 0.5 * v / mxv).toFixed(2)})`;
      cx.fill();
    }
  }
  // --- movement / attack highlights
  for (const k in hl) {
    const [q, r] = k.split(",").map(Number);
    const t2 = TMAP.get(k);
    const [x, yy] = hexXY(q, r);
    const y = yy - (t2 ? elev(t2) : 0);
    hexPath(x, y, S - 2);
    if (hl[k] === 1) { cx.fillStyle = "#ffffff22"; cx.fill();
      cx.strokeStyle = "#ffffffbb"; cx.lineWidth = 1.6; cx.stroke(); }
    else { cx.strokeStyle = "#ff5050"; cx.lineWidth = 3; cx.stroke(); }
  }
  // --- fog: parchment wash over explored-but-not-visible tiles
  for (const t of tiles) {
    if (visSet.has(key(t.pos))) continue;
    const [x, yy] = hexXY(t.pos[0], t.pos[1]);
    const y = yy - elev(t);
    hexPath(x, y, S + 0.6);
    cx.fillStyle = beau ? "rgba(199,181,138,0.52)" : "rgba(6,9,15,0.45)";
    cx.fill();
    if (beau) { cx.strokeStyle = PARCH_GRID; cx.lineWidth = 1; cx.stroke(); }
  }
  // --- right-drag order line
  if (rdrag && rdragTo && sel) {
    const ts = TMAP.get(key(sel.pos)), tt = TMAP.get(key(rdragTo));
    const [x1, yy1] = hexXY(sel.pos[0], sel.pos[1]);
    const [x2, yy2] = hexXY(rdragTo[0], rdragTo[1]);
    const y1 = yy1 - (ts ? elev(ts) : 0), y2 = yy2 - (tt ? elev(tt) : 0);
    cx.setLineDash([7, 6]); cx.strokeStyle = "#f0c674"; cx.lineWidth = 3;
    cx.beginPath(); cx.moveTo(x1, y1); cx.lineTo(x2, y2); cx.stroke();
    cx.setLineDash([]);
    hexPath(x2, y2); cx.stroke();
  }
  // --- tacks
  cx.font = "16px sans-serif";
  for (const tk of tacks) {
    const tt = TMAP.get(key(tk));
    const [x, yy] = hexXY(tk[0], tk[1]);
    cx.fillText("📍", x, yy - (tt ? elev(tt) : 0) - 6);
  }
  // --- cities
  for (const c of [...state.cities].sort((a, b) =>
      hexXY(a.pos[0], a.pos[1])[1] - hexXY(b.pos[0], b.pos[1])[1])) {
    const ct = TMAP.get(key(c.pos));
    const [x, yy] = hexXY(c.pos[0], c.pos[1]);
    const y = yy - (ct ? elev(ct) : 0);
    // ground shadow + 3D building cluster
    if (beau) { cx.fillStyle = "#00000030";
      cx.beginPath(); cx.ellipse(x, y + 8, 15, 5.5, 0, 0, 7); cx.fill(); }
    const bs = [[-9,-1,6,9],[-1,-6,7,14],[7,1,5,7]];
    for (const [bx, by, bw, bh] of bs) {
      cx.fillStyle = "#5c5648";
      cx.fillRect(x + bx + bw, y + by + 1.5, 2.2, bh); // side face
      cx.fillStyle = "#ded8ca";
      cx.fillRect(x + bx, y + by, bw, bh);
      cx.strokeStyle = "#10151d"; cx.lineWidth = 0.8;
      cx.strokeRect(x + bx, y + by, bw, bh);
    }
    cx.fillStyle = "#8a2f2b";
    cx.beginPath(); cx.moveTo(x - 2, y - 10); cx.lineTo(x + 3, y - 6);
    cx.lineTo(x - 7, y - 6); cx.closePath(); cx.fill();
    if (!minim) {
      // parchment-style nameplate
      const name = (c.is_capital ? "★ " : "") + c.name.toUpperCase();
      cx.font = "bold 10px Georgia, serif";
      const tw = Math.max(cx.measureText(name).width + 28, 48);
      const bx = x - tw / 2, by = y - S - 6;
      cx.fillStyle = "#1c2418ee";
      cx.beginPath(); cx.roundRect(bx, by, tw, 16, 8); cx.fill();
      cx.strokeStyle = pcol(c.owner); cx.lineWidth = 1.6; cx.stroke();
      cx.fillStyle = pcol(c.owner);
      cx.beginPath(); cx.roundRect(bx + 2, by + 2, 14, 12, 6); cx.fill();
      cx.fillStyle = "#10151d"; cx.font = "bold 10px Georgia, serif";
      cx.fillText(c.pop, bx + 9, by + 8.5);
      cx.fillStyle = "#f0ead8"; cx.font = "bold 9.5px Georgia, serif";
      cx.textAlign = "left";
      cx.fillText(name, bx + 20, by + 8.5);
      cx.textAlign = "center";
      if (c.hp < 200) {
        cx.fillStyle = "#300"; cx.fillRect(bx, by + 17, tw, 3);
        cx.fillStyle = "#f04040"; cx.fillRect(bx, by + 17, tw * c.hp / 200, 3);
      }
      if (c.owner === 0 && c.queue && c.queue.length && c.queue_cost) {
        cx.fillStyle = "#0d1117"; cx.fillRect(bx, by + 17, tw, 3);
        cx.fillStyle = "#e09050";
        cx.fillRect(bx, by + 17, tw * Math.min(1, c.production / c.queue_cost), 3);
      }
    }
    if (selCity && selCity.id === c.id) {
      hexPath(x, y); cx.strokeStyle = "#f0c674"; cx.lineWidth = 3; cx.stroke();
    }
  }
  // --- units
  const sorted = [...state.units].sort((a, b) =>
    (hexXY(a.pos[0], a.pos[1])[1] - hexXY(b.pos[0], b.pos[1])[1]) ||
    ((a.type === "settler" || a.type === "builder") ? -1 : 1));
  for (const u of sorted) {
    const ut = TMAP.get(key(u.pos));
    const [x, yy] = hexXY(u.pos[0], u.pos[1]);
    const y = yy - (ut ? elev(ut) : 0);
    const civ = (u.type === "settler" || u.type === "builder");
    const rr = 10.5;
    if (beau) { cx.fillStyle = "#00000035";
      cx.beginPath(); cx.ellipse(x, y + rr - 1, rr * 1.05, 4, 0, 0, 7); cx.fill(); }
    cx.save();
    cx.shadowColor = "#000a"; cx.shadowBlur = 5; cx.shadowOffsetY = 2;
    cx.fillStyle = pcol(u.owner);
    cx.beginPath();
    if (civ) cx.roundRect(x - rr, y - rr, rr * 2, rr * 2, 5);
    else cx.arc(x, y, rr, 0, 7);
    cx.fill();
    cx.restore();
    cx.strokeStyle = u.fortified ? "#f4f8ff" : "#10151d";
    cx.lineWidth = u.fortified ? 2.6 : 1.6;
    cx.beginPath();
    if (civ) cx.roundRect(x - rr, y - rr, rr * 2, rr * 2, 5);
    else cx.arc(x, y, rr, 0, 7);
    cx.stroke();
    cx.fillStyle = "#10151d"; cx.font = "11px 'Segoe UI Symbol', sans-serif";
    cx.fillText(UNIT_ICON[u.type] || u.type[0].toUpperCase(), x, y + 0.5);
    // hp arc
    if (u.hp < 100) {
      const frac = u.hp / 100;
      cx.strokeStyle = frac > 0.5 ? "#59d15e" : (frac > 0.25 ? "#e0b02f" : "#e04f3f");
      cx.lineWidth = 2.6;
      cx.beginPath();
      cx.arc(x, y, rr + 2.6, -Math.PI / 2, -Math.PI / 2 + frac * 6.283);
      cx.stroke();
    }
    if (u.level > 1) {
      cx.fillStyle = "#ffd700";
      for (let i = 0; i < u.level - 1; i++) {
        cx.beginPath(); cx.arc(x - 6 + i * 6, y - rr - 4, 2, 0, 7); cx.fill();
      }
    }
    if (sel && sel.id === u.id) {
      cx.strokeStyle = "#f0c674"; cx.lineWidth = 2.4;
      cx.setLineDash([5, 4]);
      cx.beginPath(); cx.arc(x, y, rr + 6, 0, 7); cx.stroke();
      cx.setLineDash([]);
    }
  }
}

// ---------------------------------------------------------------- minimap
function drawMini() {
  if (!state) return;
  const tiles = state.map.tiles;
  mx2.setTransform(DPR, 0, 0, DPR, 0, 0);
  mx2.fillStyle = "#000"; mx2.fillRect(0, 0, 200, 140);
  const cs = Math.min(192 / (state.map.width + 1),
                      132 / (state.map.height + 1));
  const off = 4;
  for (const t of tiles) {
    const col = t.pos[0] + (t.pos[1] - (t.pos[1] & 1)) / 2, row = t.pos[1];
    mx2.fillStyle = TERRAIN[t.terrain] || "#333";
    mx2.fillRect(off + col * cs + (row % 2) * cs / 2, off + row * cs, cs, cs);
  }
  for (const c of state.cities) {
    const col = c.pos[0] + (c.pos[1] - (c.pos[1] & 1)) / 2, row = c.pos[1];
    mx2.fillStyle = pcol(c.owner);
    mx2.fillRect(off + col * cs + (row % 2) * cs / 2 - 1, off + row * cs - 1, cs + 2, cs + 2);
  }
  // viewport rect
  const toMini = (wx, wy) => {
    const rf = wy / (1.5 * S), qf = wx / (S * SQ3) - rf / 2;
    const col = qf + rf / 2;
    return [off + col * cs, off + rf * cs];
  };
  // viewport quad (rotates with the camera)
  const cs4 = [[0, 0], [area.clientWidth, 0],
               [area.clientWidth, area.clientHeight], [0, area.clientHeight]];
  mx2.strokeStyle = "#f0c674"; mx2.lineWidth = 1;
  mx2.beginPath();
  cs4.forEach(([sx, sy], i) => {
    const [wx, wy] = screenToWorld(sx, sy);
    const [mxp, myp] = toMini(wx, wy);
    i ? mx2.lineTo(mxp, myp) : mx2.moveTo(mxp, myp);
  });
  mx2.closePath(); mx2.stroke();
}
mini.addEventListener("click", ev => {
  const r = mini.getBoundingClientRect();
  const cs = Math.min(192 / (state.map.width + 1),
                      132 / (state.map.height + 1));
  const col = (ev.clientX - r.left - 4) / cs, row = (ev.clientY - r.top - 4) / cs;
  cam.x = S * SQ3 * col; cam.y = S * 1.5 * row;
  draw(); drawMini();
});

// ---------------------------------------------------------------- panels
function drawTopbar() {
  const me = state.me, y = me.yields;
  document.getElementById("topbar").innerHTML =
    `<b>Turn ${state.turn}</b>` +
    (SPEC ? `<span>👁 watching <b>${state.players[state.player].civ}</b></span>` : "") +
    `<span>🔬 ${y.science}</span><span>🎭 ${y.culture}</span>` +
    `<span>🪙 ${Math.round(me.gold)} (+${y.gold})</span>` +
    `<span>✡ ${Math.round(me.faith)} (+${y.faith})</span>` +
    (me.government ? `<span>🏛 ${me.government.replaceAll("_"," ")}</span>` : "");
}

function drawUbar() {
  const bar = document.getElementById("ubar");
  if (!sel || SPEC) { bar.style.display = "none"; return; }
  const u = sel;
  let h = `<b>${u.type}</b> <span class="small">hp ${u.hp} · mp ${u.moves_left}` +
    (u.level > 1 ? ` · lvl ${u.level}` : "") + (u.fortified ? " · ⛨ fortified" : "") +
    (u.charges ? ` · ${u.charges} charges` : "") + `</span><br>`;
  for (const a of state.legal_actions) {
    if (a.unit !== u.id) continue;
    if (a.type === "found_city")
      h += `<button onclick='send({type:"found_city",unit:${u.id}})'>🏛 Found city</button>`;
    if (a.type === "improve")
      h += `<button onclick='send({type:"improve",unit:${u.id},improvement:"${a.improvement}"})'>⚒ ${a.improvement.replaceAll("_"," ")}</button>`;
    if (a.type === "fortify")
      h += `<button onclick='send({type:"fortify",unit:${u.id}})'>⛨ Fortify</button>`;
  }
  h += `<button onclick='sel=null;draw();drawUbar()'>✕</button>`;
  bar.innerHTML = h;
  bar.style.display = "block";
}

function prog(v, total, color) {
  const pct = Math.min(100, 100 * v / Math.max(1, total));
  return `<div class="bar"><div style="width:${pct}%;background:${color}"></div></div>` +
         `<span class="small">${Math.round(v)}/${Math.round(total)}</span>`;
}
function nameB(n, boosted) {
  return `<b>${n.replaceAll("_"," ")}</b>` +
    (boosted.includes(n) ? ` <span class="boost">⚡</span>` : "");
}
function sel1(id, opts, boosted) {
  return `<select id="${id}"><option value="">— choose —</option>` +
    opts.map(o => `<option value="${o}">${o.replaceAll("_"," ")}${boosted.includes(o) ? " ⚡" : ""}</option>`).join("") +
    `</select>`;
}
function hook(id, fn) {
  const el = document.getElementById(id);
  if (el) el.onchange = () => { if (el.value) fn(el.value); };
}
function itemName(it) {
  return (it.unit || it.building || (it.district + " @" + it.pos)).replaceAll("_", " ");
}
function itemCost(it) {
  if (!RULES) return "?";
  if (it.unit) return RULES.units[it.unit].cost;
  if (it.building) return RULES.buildings[it.building].cost;
  return RULES.districts[it.district].cost;
}
function techCost(t) { return RULES ? RULES.techs[t].cost : 100; }
function civicCost(c) { return RULES ? RULES.civics[c].cost : 100; }

function drawSide() {
  const me = state.me;
  const rdiv = document.getElementById("research");
  if (me.research) {
    rdiv.innerHTML = nameB(me.research, me.boosted_techs) +
      prog(me.research_progress, techCost(me.research), "#7fd4ff");
  } else if (SPEC) {
    rdiv.innerHTML = "<span class='small'>—</span>";
  } else {
    rdiv.innerHTML = sel1("rsel", legalFor("research").map(a => a.tech), me.boosted_techs);
    hook("rsel", v => send({type: "research", tech: v}));
  }
  const cdiv = document.getElementById("civics");
  if (me.civic) {
    cdiv.innerHTML = nameB(me.civic, me.boosted_civics) +
      prog(me.civic_progress, civicCost(me.civic), "#d4a8ff");
  } else if (SPEC) {
    cdiv.innerHTML = "<span class='small'>—</span>";
  } else {
    cdiv.innerHTML = sel1("csel", legalFor("civic").map(a => a.civic), me.boosted_civics);
    hook("csel", v => send({type: "civic", civic: v}));
  }
  const govs = legalFor("government");
  const gs = document.getElementById("govsec");
  if (govs.length || me.government) {
    gs.style.display = "block";
    document.getElementById("gov").innerHTML =
      "<b>" + (me.government || "none").replaceAll("_", " ") + "</b> " +
      govs.map(a => `<button onclick='send({type:"government",government:"${a.government}"})'>` +
        a.government.replaceAll("_", " ") + "</button>").join("");
  } else gs.style.display = "none";
  document.getElementById("players").innerHTML = state.players
    .filter(p => !p.is_barbarian)
    .map(p => `<div class="row"><span>${SPEC && p.id === state.player ? "👁 " : ""}` +
      `<span class="chip" style="background:${pcol(p.id)}"></span>` +
      `${p.civ}${p.is_minor ? " <span class='small'>(CS)</span>" : ""}${p.alive ? "" : " ☠"}` +
      `${!SPEC && p.at_war_with_me ? " ⚔" : ""}</span><span>${p.score}</span></div>`).join("");
  drawCityPanel();
}

function drawCityPanel() {
  const secEl = document.getElementById("citysec");
  if (!selCity || SPEC) { secEl.style.display = "none"; return; }
  const c = state.cities.find(x => x.id === selCity.id && x.owner === 0);
  if (!c) { selCity = null; secEl.style.display = "none"; return; }
  const striking = selCity._striking;
  selCity = c; selCity._striking = striking;
  secEl.style.display = "block";
  let h = `<b>${c.name}</b> <span class="small">pop ${c.pop} · ⌂${c.housing}` +
    ` · ☺${c.amenity_surplus >= 0 ? "+" : ""}${c.amenity_surplus} · hp ${c.hp}</span><br>` +
    `<span class="small">food</span>` + prog(c.food, c.growth_need, "#50c878");
  if (c.queue && c.queue.length) {
    h += `<span class="small">building: ${itemName(c.queue[0])}</span>` +
      prog(c.production, c.queue_cost, "#e09050");
  } else {
    h += `<span class="small">production idle (${Math.round(c.production)} banked)</span>`;
  }
  const prods = state.legal_actions.filter(a => a.type === "produce" && a.city === c.id);
  h += `<br><select id="prodsel"><option value="">— set production —</option>` +
    prods.map((a, i) => `<option value="${i}">${itemName(a.item)} (${itemCost(a.item)}⚙)</option>`).join("") +
    `</select>`;
  const buys = state.legal_actions.filter(a => a.type === "buy" && a.city === c.id);
  if (buys.length) h += "<br>" + buys.map(a =>
    `<button onclick='send(${JSON.stringify(a)})'>Buy ${a.unit} (${a.currency})</button>`).join("");
  if (state.legal_actions.some(a => a.type === "city_strike" && a.city === c.id)) {
    h += `<br><button onclick='selCity._striking=true'>🏹 Strike (click target)</button>`;
  }
  document.getElementById("citypanel").innerHTML = h;
  const ps = document.getElementById("prodsel");
  if (ps) ps.onchange = () => { if (ps.value !== "") send(prods[+ps.value]); };
}

// ---------------------------------------------------------------- trees
function openTree(kind) {
  if (!RULES || !state) return;
  const specs = kind === "techs" ? RULES.techs : RULES.civics;
  const known = new Set(kind === "techs" ? state.me.techs : state.me.civics);
  const boosted = kind === "techs" ? state.me.boosted_techs : state.me.boosted_civics;
  const current = kind === "techs" ? state.me.research : state.me.civic;
  const depth = {};
  const d = n => depth[n] !== undefined ? depth[n] :
    (depth[n] = specs[n].requires.length ? 1 + Math.max(...specs[n].requires.map(d)) : 0);
  Object.keys(specs).forEach(d);
  const cols = [];
  for (const n of Object.keys(specs)) (cols[depth[n]] = cols[depth[n]] || []).push(n);
  document.getElementById("treetitle").textContent =
    (kind === "techs" ? "Technology tree" : "Civics tree") +
    (current ? ` — researching: ${current.replaceAll("_"," ")}` : " — click a gold node");
  document.getElementById("treecols").innerHTML = cols.map(col =>
    `<div class="tcol">` + col.map(n => {
      const s = specs[n];
      const avail = !known.has(n) && s.requires.every(r => known.has(r));
      const cls = known.has(n) ? "done" : (n === current ? "cur" : (avail ? "avail" : "locked"));
      const canPick = avail && !current;
      return `<div class="tnode ${cls}"` +
        (canPick ? ` onclick='pickTree("${kind}","${n}")'` : "") + `>` +
        `<b>${n.replaceAll("_"," ")}</b>` +
        (boosted.includes(n) ? ` <span class="boost">⚡</span>` : "") +
        ` <span class="req">${s.cost}</span>` +
        (s.requires.length ? `<div class="req">← ${s.requires.map(x => x.replaceAll("_"," ")).join(", ")}</div>` : "") +
        `</div>`;
    }).join("") + `</div>`).join("");
  document.getElementById("tree").classList.add("open");
}
function pickTree(kind, n) {
  document.getElementById("tree").classList.remove("open");
  send(kind === "techs" ? {type: "research", tech: n} : {type: "civic", civic: n});
}

// ---------------------------------------------------------------- lens/tacks
function tileYieldFull(t) {
  const y = { food: 0, production: 0, gold: 0, science: 0, culture: 0, faith: 0 };
  if (!RULES) return y;
  const add = src => { if (!src || !src.yields) return;
    for (const k in y) y[k] += src.yields[k] || 0; };
  add(RULES.terrains && RULES.terrains[t.terrain]);
  if (t.hills) y.production += 1;
  if (t.feature && RULES.features) add(RULES.features[t.feature]);
  if (t.resource && RULES.resources) add(RULES.resources[t.resource]);
  if (t.improvement && t.improvement !== "barbarian_camp" && RULES.improvements)
    add(RULES.improvements[t.improvement]);
  return y;
}
function settleValue(pos) {
  let v = 0;
  const D = [[0,0],[1,0],[1,-1],[0,-1],[-1,0],[-1,1],[0,1]];
  for (const dd of D) {
    const t = nbrTile(pos, dd);
    if (!t) continue;
    const y = tileYieldFull(t);
    v += y.food * 1.2 + y.production + y.gold * 0.3;
  }
  return v;
}
function validSettle(t) {
  if (t.terrain === "ocean" || t.terrain === "coast" || t.terrain === "mountain") return false;
  if (t.owner !== null && t.owner !== undefined && t.owner !== 0) return false;
  for (const c of state.cities) if (whexDist(t.pos, c.pos) < 4) return false;
  return true;
}
function tackStoreKey() { return "civvis-tacks-" + (lastSeed === null ? "x" : lastSeed); }
function loadTacks() {
  try { tacks = JSON.parse(localStorage.getItem(tackStoreKey())) || []; }
  catch { tacks = []; }
}
function saveTacks() { localStorage.setItem(tackStoreKey(), JSON.stringify(tacks)); }
function modeline() {
  const m = [];
  if (lensOn) m.push("SETTLER LENS — greener is better (2 to exit)");
  if (tackMode) m.push("TACK MODE — click to place/remove a 📍 (3 to exit)");
  const el = document.getElementById("modeline");
  el.textContent = m.join("   ");
  el.style.display = m.length ? "block" : "none";
}
modeline();

// ---------------------------------------------------------------- camera
function zoomAt(f, sx, sy) {
  if (sx === undefined) { sx = area.clientWidth / 2; sy = area.clientHeight / 2; }
  const [wx, wy] = screenToWorld(sx, sy);
  cam.scale = Math.max(0.25, Math.min(3.2, cam.scale * f));
  const vx = (sx - area.clientWidth / 2) / cam.scale;
  const vy = (sy - area.clientHeight / 2) / cam.scale / YS;
  cam.x = wx - (COSR * vx + SINR * vy);
  cam.y = wy - (-SINR * vx + COSR * vy);
  draw(); drawMini();
}
function centerWorld(pos) {
  cam.x = S * SQ3 * (pos[0] + pos[1] / 2);
  cam.y = S * 1.5 * pos[1];
  draw(); drawMini();
}
function centerHome() {
  if (!state) return;
  const own = state.cities.find(c => c.owner === 0 && c.is_capital) ||
              state.cities.find(c => c.owner === 0) ||
              state.units.find(u => u.owner === 0);
  if (own) centerWorld(own.pos);
}
function centerOn(pos) { centerWorld(pos); }
area.addEventListener("wheel", ev => {
  ev.preventDefault();
  const r = cv.getBoundingClientRect();
  zoomAt(ev.deltaY < 0 ? 1.18 : 1 / 1.18, ev.clientX - r.left, ev.clientY - r.top);
}, { passive: false });
document.getElementById("zin").onclick = () => zoomAt(1.25);
document.getElementById("zout").onclick = () => zoomAt(0.8);
document.getElementById("zhome").onclick = centerHome;

// ---------------------------------------------------------------- input
let dragState = null, dragMoved = false, rdrag = null, rdragTo = null;
let altTap = false; // tapping Alt (no drag) resets the map to north-up
cv.addEventListener("mousedown", ev => {
  const r = cv.getBoundingClientRect();
  if (ev.button === 0) {
    dragState = { x: ev.clientX, y: ev.clientY, cx: cam.x, cy: cam.y,
                  rotate: ev.altKey, rot0: cam.rot };
    dragMoved = false;
  } else if (ev.button === 2 && state && !SPEC) {
    const pos = pixelToHex(ev.clientX - r.left, ev.clientY - r.top);
    if (!pos) return;
    const here = state.units.filter(u => u.owner === 0 && key(u.pos) === key(pos));
    if (here.length) {
      sel = here.find(u => u.moves_left > 0) || here[0];
      selCity = null; drawSide(); drawUbar();
    }
    if (sel) { rdrag = true; rdragTo = pos; draw(); }
  }
});
window.addEventListener("mousemove", ev => {
  if (dragState) {
    const dx = ev.clientX - dragState.x, dy = ev.clientY - dragState.y;
    if (Math.abs(dx) + Math.abs(dy) > 5) dragMoved = true;
    if (dragMoved && dragState.rotate) {
      // alt+drag: rotate the world; the angle persists until rotated again
      altTap = false;
      setRot(dragState.rot0 - dx * 0.008);
      draw(); drawMini();
    } else if (dragMoved) {
      const dvx = dx / cam.scale, dvy = dy / cam.scale / YS;
      cam.x = dragState.cx - (COSR * dvx + SINR * dvy);
      cam.y = dragState.cy - (-SINR * dvx + COSR * dvy);
      draw(); drawMini();
    }
  }
  if (rdrag) {
    const r = cv.getBoundingClientRect();
    const pos = pixelToHex(ev.clientX - r.left, ev.clientY - r.top);
    if (pos && (!rdragTo || key(pos) !== key(rdragTo))) { rdragTo = pos; draw(); }
  }
});
window.addEventListener("mouseup", ev => {
  if (ev.button === 0) { dragState = null; return; }
  if (ev.button !== 2 || !rdrag) return;
  const r = cv.getBoundingClientRect();
  const pos = pixelToHex(ev.clientX - r.left, ev.clientY - r.top);
  rdrag = null; rdragTo = null;
  if (!pos || !sel) { draw(); return; }
  const k = key(pos);
  if (key(sel.pos) === k) { draw(); return; }
  const atk = state.legal_actions.find(a => a.unit === sel.id &&
    (a.type === "attack" || a.type === "ranged") && key(a.target) === k);
  if (atk) { send(atk); return; }
  if ((sel.reachable || []).some(p => key(p) === k)) {
    send({type: "move_to", unit: sel.id, to: [pos[0], pos[1]]});
    return;
  }
  draw();
});
cv.addEventListener("contextmenu", ev => ev.preventDefault());
cv.addEventListener("click", ev => {
  if (dragMoved) { dragMoved = false; return; }
  const r = cv.getBoundingClientRect();
  const pos = pixelToHex(ev.clientX - r.left, ev.clientY - r.top);
  if (!pos || !state) return;
  const k = key(pos);
  if (tackMode) {
    const i = tacks.findIndex(t => t[0] === pos[0] && t[1] === pos[1]);
    if (i >= 0) tacks.splice(i, 1); else tacks.push([pos[0], pos[1]]);
    saveTacks(); draw(); return;
  }
  if (SPEC) return;
  if (sel) {
    const atk = state.legal_actions.find(a => a.unit === sel.id &&
      (a.type === "attack" || a.type === "ranged") && key(a.target) === k);
    if (atk) { send(atk); return; }
    if ((sel.reachable || []).some(p => key(p) === k)) {
      send({type: "move_to", unit: sel.id, to: [pos[0], pos[1]]});
      return;
    }
  }
  if (selCity && selCity._striking) {
    const sa = state.legal_actions.find(a => a.type === "city_strike" &&
      a.city === selCity.id && key(a.target) === k);
    if (sa) { selCity._striking = false; send(sa); return; }
  }
  const here = state.units.filter(u => u.owner === 0 && key(u.pos) === k);
  const city = state.cities.find(c => c.pos[0] === pos[0] && c.pos[1] === pos[1]);
  if (here.length) {
    const idx = sel ? (here.findIndex(u => u.id === sel.id) + 1) % here.length : 0;
    sel = here[idx];
    if (city && city.owner === 0) selCity = city;
  } else if (city && city.owner === 0) {
    selCity = city; sel = null;
  } else { sel = null; selCity = null; }
  draw(); drawSide(); drawUbar();
});

// tooltip
const tip = document.getElementById("tip");
cv.addEventListener("mousemove", ev => {
  if (!state || dragMoved || rdrag) { tip.style.display = "none"; return; }
  const r = cv.getBoundingClientRect();
  const pos = pixelToHex(ev.clientX - r.left, ev.clientY - r.top);
  const t = pos && TMAP.get(key(pos));
  if (!t) { tip.style.display = "none"; return; }
  const k = key(pos);
  const lines = [];
  let head = t.terrain + (t.hills ? " hills" : "");
  if (t.feature) head += " · " + t.feature;
  if (t.river) head += " · 💧river";
  lines.push("<b>" + head + "</b>");
  if (t.resource)
    lines.push((RES_ICON[t.resource] || "●") + " " + t.resource +
      (RULES && RULES.resources ? " (" + RULES.resources[t.resource].class + ")" : ""));
  if (t.improvement && t.improvement !== "barbarian_camp")
    lines.push("⚒ " + t.improvement.replaceAll("_", " "));
  if (t.improvement === "barbarian_camp") lines.push("⛺ barbarian camp (+50🪙 to clear)");
  if (t.district) lines.push("🏗 " + t.district.replaceAll("_", " ") + " district");
  const y = tileYieldFull(t);
  const ystr = Object.entries(y).filter(([, v]) => v > 0)
    .map(([kk, v]) => v + YICON[kk]).join(" ");
  if (ystr && !t.district) lines.push(ystr);
  if (t.owner !== null && t.owner !== undefined)
    lines.push("territory: " + state.players[t.owner].civ);
  const city = state.cities.find(c => c.pos[0] === pos[0] && c.pos[1] === pos[1]);
  if (city) lines.push("🏛 <b>" + city.name + "</b> pop " + city.pop +
    " (" + state.players[city.owner].civ + ")");
  for (const u of state.units) {
    if (key(u.pos) !== k) continue;
    lines.push("● " + state.players[u.owner].civ + " " + u.type +
      " — " + u.hp + "hp, " + u.moves_left + "mp" +
      (u.level > 1 ? ", lvl " + u.level : "") + (u.fortified ? ", fortified" : ""));
  }
  tip.innerHTML = lines.join("<br>");
  tip.style.display = "block";
  tip.style.left = Math.min(ev.clientX + 16, window.innerWidth - 290) + "px";
  tip.style.top = (ev.clientY + 16) + "px";
});
cv.addEventListener("mouseleave", () => { tip.style.display = "none"; });

// keys
function nextAction() {
  if (!state || SPEC) return;
  const ready = state.units.filter(u => u.owner === 0 && u.moves_left > 0 && !u.fortified);
  if (!ready.length) return;
  cycleIdx = (cycleIdx + 1) % ready.length;
  sel = ready[cycleIdx]; selCity = null;
  centerOn(sel.pos);
  drawSide(); drawUbar();
}
document.addEventListener("keydown", ev => {
  if (ev.key === "Alt") {
    if (!ev.repeat) altTap = true;
    ev.preventDefault();
    return;
  }
  const tag = (document.activeElement || {}).tagName;
  if (tag === "SELECT" || tag === "INPUT" || tag === "TEXTAREA") return;
  if (ev.key === "Enter") {
    if (SPEC) document.getElementById("specpause").click();
    else { sel = null; send({type: "end_turn"}); }
  }
  else if (ev.key === "Escape") {
    sel = null; selCity = null; lensOn = false; tackMode = false;
    modeline(); draw(); drawSide(); drawUbar();
  }
  else if (ev.key === "1") nextAction();
  else if (ev.key === "2") { lensOn = !lensOn; tackMode = false; modeline(); draw(); }
  else if (ev.key === "3") { tackMode = !tackMode; lensOn = false; modeline(); draw(); }
});
document.addEventListener("keyup", ev => {
  if (ev.key !== "Alt") return;
  ev.preventDefault();
  if (altTap) { setRot(0); draw(); drawMini(); }  // tap = back to north-up
  altTap = false;
});
document.getElementById("endturn").onclick = () => { sel = null; send({type: "end_turn"}); };
document.getElementById("specpause").onclick = () => {
  specPaused = !specPaused;
  document.getElementById("specpause").textContent =
    specPaused ? "▶ Resume (Enter)" : "⏸ Pause (Enter)";
  if (specPaused) clearTimeout(specTimer); else specStep();
};
document.getElementById("specspeed").onchange = () => {
  if (!specPaused) scheduleSpec(state);
};
document.getElementById("newgame").onclick = async () => {
  const np = +document.getElementById("np").value;
  sel = null; selCity = null;
  clearTimeout(specTimer); specPaused = false;
  render(await fetchJSON("/new", { method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({num_players: np, seed: Math.floor(Math.random() * 1e9),
                          spectate: document.getElementById("specchk").checked}) }));
  centerHome();
  scheduleSpec(state);
};
{
  const vs = document.getElementById("viewsel");
  vs.value = VIEW;
  vs.onchange = () => {
    VIEW = vs.value; localStorage.setItem("civvis-view", VIEW);
    if (state) draw();
  };
}

setRot(parseFloat(localStorage.getItem("civvis-rot") || "0"));
resize();
boot();
</script>
