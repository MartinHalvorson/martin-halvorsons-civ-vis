<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Martin Halvorson's Civilization VIS</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { font: 13px/1.4 system-ui, sans-serif; background: #10141a; color: #dde3ea;
         display: flex; height: 100vh; overflow: hidden; }
  #maparea { flex: 1; overflow: auto; position: relative; display: grid; place-items: center; }
  canvas { display: block; cursor: pointer; }
  #zoomctl { position: fixed; top: 10px; left: 10px; z-index: 6;
             display: flex; flex-direction: column; gap: 4px; }
  #zoomctl button { width: 36px; height: 36px; font-size: 18px; padding: 0; }
  #modeline { position: fixed; bottom: 10px; left: 10px; background: #141a23cc;
              padding: 4px 10px; border-radius: 4px; font-size: 12px; z-index: 6;
              color: #f0c674; }
  #tip { position: fixed; pointer-events: none; background: #141a23f0;
         border: 1px solid #40536b; border-radius: 6px; padding: 6px 10px;
         font-size: 12px; z-index: 20; display: none; max-width: 260px;
         line-height: 1.5; }
  #side { width: 340px; min-width: 340px; background: #171d26; padding: 10px;
          overflow-y: auto; border-left: 1px solid #2a3442; }
  h1 { font-size: 15px; margin-bottom: 6px; color: #f0c674; }
  .sec { background: #1e2530; border-radius: 6px; padding: 8px; margin-bottom: 8px; }
  .sec h2 { font-size: 12px; text-transform: uppercase; color: #8fa1b5; margin-bottom: 4px; }
  button { background: #2d3a4d; color: #dde3ea; border: 1px solid #40536b;
           border-radius: 4px; padding: 4px 8px; margin: 2px; cursor: pointer; font-size: 12px; }
  button:hover { background: #3b4d66; }
  button.primary { background: #b8860b; border-color: #daa520; font-weight: bold;
                   width: 100%; padding: 8px; font-size: 14px; }
  button.primary:hover { background: #daa520; }
  .bar { background: #0d1117; border-radius: 3px; height: 10px; overflow: hidden; margin: 2px 0; }
  .bar div { height: 100%; }
  .chip { display: inline-block; width: 10px; height: 10px; border-radius: 5px; margin-right: 4px; }
  .row { display: flex; justify-content: space-between; padding: 1px 0; }
  #err { color: #ff7070; min-height: 16px; font-size: 12px; }
  #winner { position: absolute; top: 30%; left: 50%; transform: translate(-50%,-50%);
            background: rgba(20,26,34,.95); border: 2px solid #f0c674; border-radius: 10px;
            padding: 24px 40px; font-size: 20px; display: none; z-index: 5; text-align: center; }
  select { background: #2d3a4d; color: #dde3ea; border: 1px solid #40536b; border-radius: 4px;
           padding: 3px; max-width: 100%; }
  .small { font-size: 11px; color: #8fa1b5; }
  .boost { color: #7fd4ff; }
  .mini { font-size: 10px; padding: 1px 6px; margin-left: 6px; }
  #tree { position: fixed; inset: 4% 3%; background: #141a23; border: 1px solid #40536b;
          border-radius: 8px; z-index: 10; display: none; flex-direction: column; padding: 12px; }
  #tree.open { display: flex; }
  #treehead { display: flex; justify-content: space-between; margin-bottom: 8px; }
  #treecols { display: flex; gap: 14px; overflow: auto; flex: 1; align-items: flex-start; }
  .tcol { display: flex; flex-direction: column; gap: 8px; min-width: 160px; }
  .tnode { background: #1e2530; border: 1px solid #40536b; border-radius: 6px;
           padding: 6px 8px; font-size: 12px; }
  .tnode.done { border-color: #50c878; color: #7fdc9c; }
  .tnode.cur { border-color: #7fd4ff; box-shadow: 0 0 6px #7fd4ff60; }
  .tnode.avail { border-color: #f0c674; cursor: pointer; }
  .tnode.avail:hover { background: #2d3a4d; }
  .tnode.locked { opacity: 0.45; }
  .tnode .req { color: #8fa1b5; font-size: 10px; }
</style>
</head>
<body>
<div id="maparea">
  <canvas id="map"></canvas>
  <div id="winner"></div>
  <div id="tree">
    <div id="treehead"><b id="treetitle"></b>
      <button onclick='document.getElementById("tree").classList.remove("open")'>✕ close</button>
    </div>
    <div id="treecols"></div>
  </div>
  <div id="zoomctl">
    <button id="zin" title="zoom in">+</button>
    <button id="zout" title="zoom out">−</button>
    <button id="zhome" title="center on your empire">⌂</button>
  </div>
  <div id="modeline"></div>
  <div id="tip"></div>
</div>
<div id="side">
  <h1>Civilization VIS</h1>
  <div class="sec" id="topinfo"></div>
  <div class="sec"><h2>Research <button class="mini" onclick='openTree("techs")'>tree map</button></h2><div id="research"></div></div>
  <div class="sec"><h2>Civics <button class="mini" onclick='openTree("civics")'>tree map</button></h2><div id="civics"></div></div>
  <div class="sec" id="govsec" style="display:none"><h2>Government</h2><div id="gov"></div></div>
  <div class="sec" id="unitsec" style="display:none"><h2>Selected unit</h2><div id="unitpanel"></div></div>
  <div class="sec" id="citysec" style="display:none"><h2>City</h2><div id="citypanel"></div></div>
  <div class="sec"><h2>Players</h2><div id="players"></div></div>
  <div id="err"></div>
  <button class="primary" id="endturn">End Turn (Enter)</button>
  <div class="sec" style="margin-top:8px">
    <h2>Display</h2>
    <select id="viewsel">
      <option value="beautiful">beautiful</option>
      <option value="simple">simple</option>
      <option value="minimal">minimal (fastest)</option>
    </select>
    <div class="small">headless sims: CLI `civvis simulate / soak`</div>
  </div>
  <div class="sec" style="margin-top:8px">
    <h2>New game</h2>
    players <select id="np"><option>2</option><option selected>4</option><option>6</option></select>
    <button id="newgame">Restart</button>
  </div>
</div>
<script>
"use strict";
let S = 28;
const SQ3 = Math.sqrt(3);
const TERRAIN = { grassland:"#4c7a3f", plains:"#8a8f3f", desert:"#c9b26b", tundra:"#7d8a7d",
                  snow:"#dfe6ea", coast:"#3b6d8f", ocean:"#1f3d5c", mountain:"#6b6f76" };
const PCOLORS = ["#ffd700","#e05050","#50a0e0","#50c878","#c878e0","#e09050","#70d0d0","#f0f080",
                 "#a0a0ff","#ffa0c0","#80e080","#d0b080"];
const FEAT = { forest:"♣", jungle:"☘", marsh:"~", oasis:"☉" };
const TERRAIN2 = { grassland:"#5d9450", plains:"#a3a851", desert:"#e0c987",
                   tundra:"#96a396", snow:"#f2f7fa", coast:"#4d86ad",
                   ocean:"#27496b", mountain:"#82868e" };
const FEAT_ICON = { forest:"🌲", jungle:"🌴", marsh:"🌾", oasis:"🏝" };
const RES_ICON = { wheat:"🌾", cattle:"🐄", sheep:"🐑", stone:"🪨", deer:"🦌",
                   fish:"🐟", bananas:"🍌", horses:"🐎", iron:"⚒️", silk:"🧵",
                   wine:"🍷", salt:"🧂" };
const YICON = { food:"🍞", production:"⚙️", gold:"🪙", science:"🔬",
                culture:"🎭", faith:"✡" };
let VIEW = localStorage.getItem("civvis-view") || "beautiful";
let state = null, sel = null, selCity = null, ox = 0, oy = 0;
let lensOn = false, tackMode = false, tacks = [], dragMoved = false;
let TMAP = new Map(), lastSeed = null, cycleIdx = -1;
const DISK1 = [[0,0],[1,0],[1,-1],[0,-1],[-1,0],[-1,1],[0,1]];
function hexDist(a, b) {
  const dq = a[0]-b[0], dr = a[1]-b[1];
  return Math.max(Math.abs(dq), Math.abs(dr), Math.abs(dq+dr));
}
const cv = document.getElementById("map"), cx = cv.getContext("2d");

function pcol(id) { const p = state.players[id]; return p && p.is_barbarian ? "#222" : PCOLORS[id % PCOLORS.length]; }
function hexXY(q, r) { return [ox + S*SQ3*(q + r/2), oy + S*1.5*r]; }
function key(p) { return p[0] + "," + p[1]; }

let firstLoad = true;
async function fetchState() {
  render(await (await fetch("/state")).json());
  if (firstLoad) { firstLoad = false; centerHome(); }
}
async function send(action) {
  const r = await (await fetch("/action", {method:"POST", headers:{"Content-Type":"application/json"},
                   body: JSON.stringify({action})})).json();
  render(r);
}

function legalFor(type) { return state.legal_actions.filter(a => a.type === type); }

function render(st) {
  state = st;
  if (st.seed !== undefined && st.seed !== lastSeed) { lastSeed = st.seed; loadTacks(); }
  if (sel) sel = st.units.find(u => u.id === sel.id && u.owner === 0) || null;
  document.getElementById("err").textContent = st.error || "";
  if (st.error === undefined || st.error === null) { /* keep selection */ }
  drawMap();
  drawSide();
  const w = document.getElementById("winner");
  if (st.winner !== null && st.winner !== undefined) {
    const p = st.players[st.winner];
    w.style.display = "block";
    w.innerHTML = (st.winner === 0 ? "🏆 Victory!" : "Defeat") +
      "<br><span class='small'>" + p.civ + " wins by " + st.victory_type +
      " on turn " + st.turn + "</span>";
  } else w.style.display = "none";
}

function drawMap() {
  const tiles = state.map.tiles;
  TMAP = new Map(tiles.map(t => [key(t.pos), t]));
  let minx=1e9, miny=1e9, maxx=-1e9, maxy=-1e9;
  ox = 0; oy = 0;
  for (const t of tiles) {
    const [x,y] = hexXY(t.pos[0], t.pos[1]);
    minx=Math.min(minx,x); maxx=Math.max(maxx,x);
    miny=Math.min(miny,y); maxy=Math.max(maxy,y);
  }
  ox = -minx + S*2; oy = -miny + S*2;
  cv.width = maxx-minx + S*4; cv.height = maxy-miny + S*4;
  cx.fillStyle = "#0a0d12"; cx.fillRect(0,0,cv.width,cv.height);
  const visSet = new Set(state.visible.map(key));
  const campSet = new Set(state.camps.map(key));
  const unitsAt = {}, cityAt = {};
  for (const u of state.units) (unitsAt[key(u.pos)] = unitsAt[key(u.pos)] || []).push(u);
  for (const c of state.cities) cityAt[key(c.pos)] = c;
  // move/attack highlights for the selected unit
  const hl = {};
  if (sel) {
    for (const p of (sel.reachable || [])) hl[key(p)] = "#ffffff";
    for (const a of state.legal_actions) {
      if (a.unit !== sel.id) continue;
      if (a.type === "attack" || a.type === "ranged") hl[key(a.target)] = "#ff5050";
    }
  }
  const R = S / 24;
  const f = n => Math.max(7, Math.round(n * R));
  for (const t of tiles) {
    const [x,y] = hexXY(t.pos[0], t.pos[1]);
    const k = key(t.pos);
    hexPath(x,y);
    if (VIEW === "beautiful") {
      const grad = cx.createRadialGradient(x, y - 4*R, 2*R, x, y, S * 1.1);
      grad.addColorStop(0, TERRAIN2[t.terrain] || "#444");
      grad.addColorStop(1, TERRAIN[t.terrain] || "#333");
      cx.fillStyle = grad;
    } else {
      cx.fillStyle = TERRAIN[t.terrain] || "#333";
    }
    cx.fill();
    if (t.owner !== null && t.owner !== undefined) {
      cx.strokeStyle = pcol(t.owner); cx.lineWidth = 1.5*R; cx.globalAlpha = 0.8;
      cx.stroke(); cx.globalAlpha = 1;
    } else { cx.strokeStyle = "#00000040"; cx.lineWidth = 1; cx.stroke(); }
    cx.textAlign = "center";
    if (VIEW !== "minimal") {
      cx.fillStyle = "#00000090";
      cx.font = f(11) + "px sans-serif";
      if (t.hills) { cx.fillText("◠◠", x, y - 6*R); }
      if (t.feature) {
        if (VIEW === "beautiful") {
          cx.font = f(13) + "px sans-serif";
          cx.fillText(FEAT_ICON[t.feature] || "?", x - 7*R, y + 12*R);
          cx.font = f(11) + "px sans-serif";
        } else {
          cx.fillText(FEAT[t.feature] || "?", x - 8*R, y + 12*R);
        }
      }
      if (t.resource) {
        if (VIEW === "beautiful" && RES_ICON[t.resource]) {
          cx.font = f(12) + "px sans-serif";
          cx.fillText(RES_ICON[t.resource], x + 8*R, y + 12*R);
          cx.font = f(11) + "px sans-serif";
        } else {
          cx.fillStyle = "#ffe080"; cx.fillText("●", x + 9*R, y + 12*R);
          cx.fillStyle = "#00000090";
        }
      }
      if (t.improvement === "barbarian_camp" || campSet.has(k)) {
        cx.fillStyle = "#ff4040"; cx.font = "bold " + f(13) + "px sans-serif";
        cx.fillText("⛺", x, y+4*R);
        cx.fillStyle = "#00000090";
      } else if (t.improvement) { cx.fillStyle = "#5a4632";
        cx.fillRect(x-3*R, y+6*R, 6*R, 4*R);
        cx.fillStyle = "#00000090"; }
    }
    if (t.district) { cx.fillStyle = "#e8e8e8"; cx.fillRect(x-6*R, y-4*R, 12*R, 9*R);
      cx.fillStyle = "#111"; cx.font = "bold " + f(9) + "px sans-serif";
      cx.fillText(t.district[0].toUpperCase(), x, y+3*R); }
    if (!visSet.has(k)) { hexPath(x,y); cx.fillStyle = "rgba(5,8,14,0.45)"; cx.fill(); }
    if (hl[k]) { hexPath(x,y); cx.strokeStyle = hl[k]; cx.lineWidth = 2.5*R; cx.stroke(); }
  }
  // cities
  for (const c of state.cities) {
    const [x,y] = hexXY(c.pos[0], c.pos[1]);
    cx.beginPath(); cx.arc(x, y, 9*R, 0, 7);
    cx.fillStyle = pcol(c.owner); cx.fill();
    cx.strokeStyle = "#111"; cx.lineWidth = 1.5*R; cx.stroke();
    cx.fillStyle = "#111"; cx.font = "bold " + f(10) + "px sans-serif";
    cx.fillText(c.pop, x, y+3.5*R);
    cx.font = f(10) + "px sans-serif"; cx.fillStyle = "#fff";
    cx.fillText((c.is_capital ? "★ " : "") + c.name, x, y - 13*R);
    if (c.hp < 200) { cx.fillStyle = "#300"; cx.fillRect(x-12*R, y+11*R, 24*R, 3*R);
      cx.fillStyle = "#f33"; cx.fillRect(x-12*R, y+11*R, 24*R*c.hp/200, 3*R); }
    if (selCity && selCity.id === c.id) { hexPath(x,y); cx.strokeStyle = "#f0c674";
      cx.lineWidth = 2.5*R; cx.stroke(); }
  }
  // units (military drawn on top of civilians)
  for (const u of state.units.sort((a,b) => (a.type==="settler"||a.type==="builder") ? -1 : 1)) {
    const [x,y] = hexXY(u.pos[0], u.pos[1]);
    const civ = (u.type === "settler" || u.type === "builder");
    cx.beginPath();
    if (civ) { cx.rect(x-6*R, y-6*R, 12*R, 12*R); } else { cx.arc(x, y, 7*R, 0, 7); }
    cx.fillStyle = pcol(u.owner); cx.fill();
    cx.strokeStyle = u.fortified ? "#fff" : "#111"; cx.lineWidth = (u.fortified ? 2.5 : 1.5)*R;
    cx.stroke();
    cx.fillStyle = "#111"; cx.font = "bold " + f(9) + "px sans-serif";
    cx.fillText(u.type[0].toUpperCase(), x, y+3*R);
    if (u.hp < 100) { cx.fillStyle = "#300"; cx.fillRect(x-8*R, y+9*R, 16*R, 3*R);
      cx.fillStyle = "#3f3"; cx.fillRect(x-8*R, y+9*R, 16*R*u.hp/100, 3*R); }
    if (u.level > 1) { cx.fillStyle = "#ffd700"; cx.font = f(8) + "px sans-serif";
      cx.fillText("✦".repeat(u.level-1), x, y-9*R); }
    if (sel && sel.id === u.id) { cx.beginPath(); cx.arc(x, y, 11*R, 0, 7);
      cx.strokeStyle = "#f0c674"; cx.lineWidth = 2.5*R; cx.stroke(); }
  }
  // settler lens (key 2): green = good settle spots
  if (lensOn) {
    const vals = [];
    for (const t of tiles) if (validSettle(t)) vals.push([t.pos, settleValue(t.pos)]);
    const mx = Math.max(1, ...vals.map(v => v[1]));
    for (const [p2, v] of vals) {
      const [x, y] = hexXY(p2[0], p2[1]);
      hexPath(x, y);
      cx.fillStyle = `rgba(80,255,120,${(0.12 + 0.5*v/mx).toFixed(2)})`;
      cx.fill();
    }
  }
  // right-drag order preview line
  if (rdrag && rdragTo && sel) {
    const [x1, y1] = hexXY(sel.pos[0], sel.pos[1]);
    const [x2, y2] = hexXY(rdragTo[0], rdragTo[1]);
    cx.setLineDash([6, 5]);
    cx.strokeStyle = "#f0c674"; cx.lineWidth = 2.5;
    cx.beginPath(); cx.moveTo(x1, y1); cx.lineTo(x2, y2); cx.stroke();
    cx.setLineDash([]);
    hexPath(x2, y2); cx.stroke();
  }
  // map tacks (key 3)
  for (const tk of tacks) {
    const [x, y] = hexXY(tk[0], tk[1]);
    cx.font = f(15) + "px sans-serif"; cx.textAlign = "center";
    cx.fillStyle = "#fff";
    cx.fillText("📍", x, y - 2*R);
  }
}

function tileYield(t) {
  const y = tileYieldFull(t);
  return { food: y.food, production: y.production, gold: y.gold };
}

function tileYieldFull(t) {
  const y = { food: 0, production: 0, gold: 0, science: 0, culture: 0, faith: 0 };
  if (!RULES) return y;
  const add = src => {
    if (!src || !src.yields) return;
    for (const k in y) y[k] += src.yields[k] || 0;
  };
  add(RULES.terrains && RULES.terrains[t.terrain]);
  if (t.hills) y.production += 1;
  if (t.feature && RULES.features) add(RULES.features[t.feature]);
  if (t.resource && RULES.resources) add(RULES.resources[t.resource]);
  if (t.improvement && t.improvement !== "barbarian_camp" && RULES.improvements)
    add(RULES.improvements[t.improvement]);
  return y;
}

function settleValue(pos) {
  let v = 0;
  for (const d of DISK1) {
    const t = TMAP.get((pos[0]+d[0]) + "," + (pos[1]+d[1]));
    if (!t) continue;
    const y = tileYield(t);
    v += y.food * 1.2 + y.production + y.gold * 0.3;
  }
  return v;
}

function validSettle(t) {
  if (t.terrain === "ocean" || t.terrain === "coast" || t.terrain === "mountain") return false;
  if (t.owner !== null && t.owner !== undefined && t.owner !== 0) return false;
  for (const c of state.cities) if (hexDist(t.pos, c.pos) < 4) return false;
  return true;
}

function tackStoreKey() { return "civvis-tacks-" + (lastSeed === null ? "x" : lastSeed); }
function loadTacks() {
  try { tacks = JSON.parse(localStorage.getItem(tackStoreKey())) || []; }
  catch { tacks = []; }
}
function saveTacks() { localStorage.setItem(tackStoreKey(), JSON.stringify(tacks)); }

function modeline() {
  const m = [];
  if (lensOn) m.push("SETTLER LENS — greener is better (2 to exit)");
  if (tackMode) m.push("TACK MODE — click to place/remove a 📍 (3 to exit)");
  document.getElementById("modeline").textContent = m.join("   ");
}

function nextAction() {
  if (!state) return;
  const ready = state.units.filter(u => u.owner === 0 && u.moves_left > 0 && !u.fortified);
  if (!ready.length) return;
  cycleIdx = (cycleIdx + 1) % ready.length;
  sel = ready[cycleIdx]; selCity = null;
  const [x, y] = hexXY(sel.pos[0], sel.pos[1]);
  area.scrollLeft = padL() + x - area.clientWidth / 2;
  area.scrollTop = padT() + y - area.clientHeight / 2;
  drawMap(); drawSide();
}

const area = document.getElementById("maparea");
function padL() { return Math.max(0, (area.clientWidth - cv.width) / 2); }
function padT() { return Math.max(0, (area.clientHeight - cv.height) / 2); }

function zoomAt(factor, clientX, clientY) {
  if (!state) return;
  const arect = area.getBoundingClientRect();
  const vx = (clientX === undefined ? area.clientWidth / 2 : clientX - arect.left);
  const vy = (clientY === undefined ? area.clientHeight / 2 : clientY - arect.top);
  const wx = (vx + area.scrollLeft - padL() - ox) / S;
  const wy = (vy + area.scrollTop - padT() - oy) / S;
  const old = S;
  S = Math.max(10, Math.min(64, Math.round(S * factor)));
  if (S === old) return;
  drawMap();
  area.scrollLeft = padL() + wx * S + ox - vx;
  area.scrollTop = padT() + wy * S + oy - vy;
}

function centerHome() {
  if (!state) return;
  const own = state.cities.find(c => c.owner === 0 && c.is_capital) ||
              state.cities.find(c => c.owner === 0) ||
              state.units.find(u => u.owner === 0);
  if (!own) return;
  const [x, y] = hexXY(own.pos[0], own.pos[1]);
  area.scrollLeft = padL() + x - area.clientWidth / 2;
  area.scrollTop = padT() + y - area.clientHeight / 2;
}

area.addEventListener("wheel", ev => {
  ev.preventDefault();
  zoomAt(ev.deltaY < 0 ? 1.2 : 1 / 1.2, ev.clientX, ev.clientY);
}, { passive: false });
document.getElementById("zin").onclick = () => zoomAt(1.25);
document.getElementById("zout").onclick = () => zoomAt(0.8);
document.getElementById("zhome").onclick = centerHome;

function hexPath(x, y) {
  cx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = Math.PI/180 * (60*i - 30);
    const px = x + S*Math.cos(a), py = y + S*Math.sin(a);
    i ? cx.lineTo(px,py) : cx.moveTo(px,py);
  }
  cx.closePath();
}

function pixelToHex(px, py) {
  let best = null, bd = 1e9;
  for (const t of state.map.tiles) {
    const [x,y] = hexXY(t.pos[0], t.pos[1]);
    const d = (x-px)**2 + (y-py)**2;
    if (d < bd) { bd = d; best = t.pos; }
  }
  return bd <= (S*1.1)**2 ? best : null;
}

cv.addEventListener("click", ev => {
  if (dragMoved) { dragMoved = false; return; }
  const rect = cv.getBoundingClientRect();
  const pos = pixelToHex(ev.clientX-rect.left, ev.clientY-rect.top);
  if (!pos) return;
  const k = key(pos);
  if (tackMode) {
    const i = tacks.findIndex(t => t[0] === pos[0] && t[1] === pos[1]);
    if (i >= 0) tacks.splice(i, 1); else tacks.push([pos[0], pos[1]]);
    saveTacks(); drawMap(); return;
  }
  // acting on a highlighted tile with the selected unit?
  if (sel) {
    const atk = state.legal_actions.find(a => a.unit === sel.id &&
      (a.type === "attack" || a.type === "ranged") && key(a.target) === k);
    if (atk) { send(atk); return; }
    if ((sel.reachable || []).some(p => key(p) === k)) {
      send({type: "move_to", unit: sel.id, to: [pos[0], pos[1]]});
      return;
    }
  }
  // strike target?
  if (selCity && selCity._striking) {
    const sa = state.legal_actions.find(a => a.type === "city_strike" &&
      a.city === selCity.id && key(a.target) === k);
    if (sa) { selCity._striking = false; send(sa); return; }
  }
  // select own unit (cycle on repeat click) or own city
  const here = state.units.filter(u => u.owner === 0 && key(u.pos) === k);
  const city = state.cities.find(c => c.pos[0] === pos[0] && c.pos[1] === pos[1]);
  if (here.length) {
    const idx = sel ? (here.findIndex(u => u.id === sel.id) + 1) % here.length : 0;
    sel = here[idx];
    selCity = (city && city.owner === 0 && sel === null) ? city : selCity;
    if (city && city.owner === 0) selCity = city;
  } else if (city && city.owner === 0) {
    selCity = city; sel = null;
  } else { sel = null; selCity = null; }
  drawMap(); drawSide();
});

function drawSide() {
  const me = state.me, y = me.yields;
  document.getElementById("topinfo").innerHTML =
    `<div class="row"><b>Turn ${state.turn}</b><span>` +
    `\u{1F52C}${y.science} \u{1F3AD}${y.culture} \u{1FA99}${Math.round(me.gold)}` +
    ` (+${y.gold}) ✡${Math.round(me.faith)}</span></div>`;
  // research
  const rdiv = document.getElementById("research");
  if (me.research) {
    const cost = techCost(me.research);
    rdiv.innerHTML = nameB(me.research, me.boosted_techs) +
      prog(me.research_progress, cost, "#7fd4ff");
  } else {
    rdiv.innerHTML = sel1("rsel", legalFor("research").map(a => a.tech), me.boosted_techs);
    hook("rsel", v => send({type:"research", tech:v}));
  }
  const cdiv = document.getElementById("civics");
  if (me.civic) {
    cdiv.innerHTML = nameB(me.civic, me.boosted_civics) +
      prog(me.civic_progress, civicCost(me.civic), "#d4a8ff");
  } else {
    cdiv.innerHTML = sel1("csel", legalFor("civic").map(a => a.civic), me.boosted_civics);
    hook("csel", v => send({type:"civic", civic:v}));
  }
  // government
  const govs = legalFor("government");
  const gs = document.getElementById("govsec");
  if (govs.length || me.government) {
    gs.style.display = "block";
    document.getElementById("gov").innerHTML = "<b>" + (me.government || "none") + "</b> " +
      govs.map(a => `<button onclick='send({type:"government",government:"${a.government}"})'>` +
                    a.government + "</button>").join("");
  } else gs.style.display = "none";
  // players
  document.getElementById("players").innerHTML = state.players
    .filter(p => !p.is_barbarian)
    .map(p => `<div class="row"><span><span class="chip" style="background:${pcol(p.id)}"></span>` +
      `${p.civ}${p.is_minor ? " (CS)" : ""}${p.alive ? "" : " ☠"}` +
      `${p.at_war_with_me ? " ⚔" : ""}</span><span>${p.score}</span></div>`).join("");
  drawUnitPanel(); drawCityPanel();
}

function drawUnitPanel() {
  const secEl = document.getElementById("unitsec");
  if (!sel) { secEl.style.display = "none"; return; }
  const u = state.units.find(x => x.id === sel.id);
  if (!u) { sel = null; secEl.style.display = "none"; return; }
  sel = u;
  secEl.style.display = "block";
  let h = `<b>${u.type}</b> hp ${u.hp} moves ${u.moves_left}` +
          (u.level > 1 ? ` lvl ${u.level}` : "") + (u.fortified ? " ⛨" : "") +
          (u.charges ? ` charges ${u.charges}` : "") + "<br>";
  for (const a of state.legal_actions) {
    if (a.unit !== u.id) continue;
    if (a.type === "found_city") h += `<button onclick='send({type:"found_city",unit:${u.id}})'>Found city</button>`;
    if (a.type === "improve") h += `<button onclick='send({type:"improve",unit:${u.id},improvement:"${a.improvement}"})'>Build ${a.improvement}</button>`;
    if (a.type === "fortify") h += `<button onclick='send({type:"fortify",unit:${u.id}})'>Fortify</button>`;
  }
  h += `<button onclick='sel=null;drawMap();drawSide()'>Deselect</button>`;
  document.getElementById("unitpanel").innerHTML = h;
}

function drawCityPanel() {
  const secEl = document.getElementById("citysec");
  if (!selCity) { secEl.style.display = "none"; return; }
  const c = state.cities.find(x => x.id === selCity.id && x.owner === 0);
  if (!c) { selCity = null; secEl.style.display = "none"; return; }
  const striking = selCity._striking;
  selCity = c; selCity._striking = striking;
  secEl.style.display = "block";
  let h = `<b>${c.name}</b> pop ${c.pop} ⌂${c.housing}` +
    ` ☺${c.amenity_surplus >= 0 ? "+" : ""}${c.amenity_surplus} hp ${c.hp}<br>` +
    `<span class="small">food</span>` + prog(c.food, c.growth_need, "#50c878");
  if (c.queue && c.queue.length) {
    h += `<span class="small">building: ${itemName(c.queue[0])}</span>` +
         prog(c.production, c.queue_cost, "#e09050");
  } else h += `<span class="small">production idle (${Math.round(c.production)} banked)</span>`;
  const prods = state.legal_actions.filter(a => a.type === "produce" && a.city === c.id);
  h += `<br><select id="prodsel"><option value="">— set production —</option>` +
    prods.map((a,i) => `<option value="${i}">${itemName(a.item)} (${itemCost(a.item)}⚙)</option>`).join("") +
    `</select>`;
  const buys = state.legal_actions.filter(a => a.type === "buy" && a.city === c.id);
  if (buys.length) h += "<br>" + buys.map(a =>
    `<button onclick='send(${JSON.stringify(a)})'>Buy ${a.unit} (${a.currency})</button>`).join("");
  if (state.legal_actions.some(a => a.type === "city_strike" && a.city === c.id)) {
    h += `<br><button onclick='selCity._striking=true'>\u{1F3F9} Strike (click target)</button>`;
  }
  document.getElementById("citypanel").innerHTML = h;
  const ps = document.getElementById("prodsel");
  if (ps) ps.onchange = () => { if (ps.value !== "") send(prods[+ps.value]); };
}

function itemName(it) {
  return it.unit || it.building || (it.district + " @" + it.pos);
}
let RULES = null;
async function loadRules() { RULES = await (await fetch("/rules")).json(); }
function itemCost(it) {
  if (!RULES) return "?";
  if (it.unit) return RULES.units[it.unit].cost;
  if (it.building) return RULES.buildings[it.building].cost;
  return RULES.districts[it.district].cost;
}
function techCost(t) { return RULES ? RULES.techs[t].cost : 100; }
function civicCost(c) { return RULES ? RULES.civics[c].cost : 100; }

function openTree(kind) {
  if (!RULES || !state) return;
  const specs = kind === "techs" ? RULES.techs : RULES.civics;
  const known = new Set(kind === "techs" ? state.me.techs : state.me.civics);
  const boosted = kind === "techs" ? state.me.boosted_techs : state.me.boosted_civics;
  const current = kind === "techs" ? state.me.research : state.me.civic;
  const depth = {};
  const d = n => depth[n] !== undefined ? depth[n] :
    (depth[n] = specs[n].requires.length
      ? 1 + Math.max(...specs[n].requires.map(d)) : 0);
  Object.keys(specs).forEach(d);
  const cols = [];
  for (const n of Object.keys(specs)) (cols[depth[n]] = cols[depth[n]] || []).push(n);
  document.getElementById("treetitle").textContent =
    (kind === "techs" ? "Technology tree" : "Civics tree") +
    (current ? ` — researching: ${current}` : " — click a gold node to research");
  document.getElementById("treecols").innerHTML = cols.map(col =>
    `<div class="tcol">` + col.map(n => {
      const s = specs[n];
      const avail = !known.has(n) && s.requires.every(r => known.has(r));
      const cls = known.has(n) ? "done" : (n === current ? "cur" :
                  (avail ? "avail" : "locked"));
      const canPick = avail && !current;
      return `<div class="tnode ${cls}"` +
        (canPick ? ` onclick='pickTree("${kind}","${n}")'` : "") + `>` +
        `<b>${n.replaceAll("_"," ")}</b>` +
        (boosted.includes(n) ? ` <span class="boost">⚡</span>` : "") +
        ` <span class="req">${s.cost}</span>` +
        (s.requires.length ? `<div class="req">← ${s.requires.map(x =>
          x.replaceAll("_"," ")).join(", ")}</div>` : "") +
        `</div>`;
    }).join("") + `</div>`).join("");
  document.getElementById("tree").classList.add("open");
}
function pickTree(kind, n) {
  document.getElementById("tree").classList.remove("open");
  send(kind === "techs" ? {type: "research", tech: n} : {type: "civic", civic: n});
}

function prog(v, total, color) {
  const pct = Math.min(100, 100*v/Math.max(1,total));
  return `<div class="bar"><div style="width:${pct}%;background:${color}"></div></div>` +
         `<span class="small">${Math.round(v)}/${Math.round(total)}</span>`;
}
function nameB(n, boosted) {
  return `<b>${n}</b>` + (boosted.includes(n) ? ` <span class="boost">⚡</span>` : "");
}
function sel1(id, opts, boosted) {
  return `<select id="${id}"><option value="">— choose —</option>` +
    opts.map(o => `<option>${o}${boosted.includes(o) ? " ⚡" : ""}</option>`).join("") +
    `</select>`;
}
function hook(id, fn) {
  const el = document.getElementById(id);
  if (el) el.onchange = () => { if (el.value) fn(el.value.replace(" ⚡","")); };
}

document.getElementById("endturn").onclick = () => { sel = null; send({type:"end_turn"}); };

// Civ-style bindings: 1 = next action, 2 = settler lens, 3 = map tacks
document.addEventListener("keydown", ev => {
  const tag = (document.activeElement || {}).tagName;
  if (tag === "SELECT" || tag === "INPUT" || tag === "TEXTAREA") return;
  if (ev.key === "Enter") { sel = null; send({type:"end_turn"}); }
  else if (ev.key === "Escape") {
    sel = null; selCity = null; lensOn = false; tackMode = false;
    modeline(); drawMap(); drawSide();
  }
  else if (ev.key === "1") nextAction();
  else if (ev.key === "2") { lensOn = !lensOn; tackMode = false; modeline(); drawMap(); }
  else if (ev.key === "3") { tackMode = !tackMode; lensOn = false; modeline(); drawMap(); }
});

// right mouse: press on a unit (or with one selected), drag, release on the
// target tile to order it (move_to / attack / ranged). Plain right-click on a
// target does the same.
let rdrag = null, rdragTo = null;
cv.addEventListener("contextmenu", ev => ev.preventDefault());
cv.addEventListener("mousedown", ev => {
  if (ev.button !== 2 || !state) return;
  const rect = cv.getBoundingClientRect();
  const pos = pixelToHex(ev.clientX - rect.left, ev.clientY - rect.top);
  if (!pos) return;
  const here = state.units.filter(u => u.owner === 0 && key(u.pos) === key(pos));
  if (here.length) {
    sel = here.find(u => u.moves_left > 0) || here[0];
    selCity = null;
    drawSide();
  }
  if (sel) { rdrag = true; rdragTo = pos; drawMap(); }
});
cv.addEventListener("mousemove", ev => {
  if (!rdrag) return;
  const rect = cv.getBoundingClientRect();
  const pos = pixelToHex(ev.clientX - rect.left, ev.clientY - rect.top);
  if (pos && (!rdragTo || key(pos) !== key(rdragTo))) { rdragTo = pos; drawMap(); }
});
window.addEventListener("mouseup", ev => {
  if (ev.button !== 2 || !rdrag) return;
  const rect = cv.getBoundingClientRect();
  const pos = pixelToHex(ev.clientX - rect.left, ev.clientY - rect.top);
  rdrag = null; rdragTo = null;
  if (!pos || !sel) { drawMap(); return; }
  const k = key(pos);
  if (key(sel.pos) === k) { drawMap(); return; }  // released on the unit itself
  const atk = state.legal_actions.find(a => a.unit === sel.id &&
    (a.type === "attack" || a.type === "ranged") && key(a.target) === k);
  if (atk) { send(atk); return; }
  if ((sel.reachable || []).some(p => key(p) === k)) {
    send({type: "move_to", unit: sel.id, to: [pos[0], pos[1]]});
    return;
  }
  drawMap();
});

// left-drag pans the map (click still selects if the mouse barely moved)
let dragState = null;
area.addEventListener("mousedown", ev => {
  if (ev.button !== 0) return;
  dragState = { x: ev.clientX, y: ev.clientY,
                sl: area.scrollLeft, st: area.scrollTop };
  dragMoved = false;
});
window.addEventListener("mousemove", ev => {
  if (!dragState) return;
  const dx = ev.clientX - dragState.x, dy = ev.clientY - dragState.y;
  if (Math.abs(dx) + Math.abs(dy) > 6) dragMoved = true;
  if (dragMoved) {
    area.scrollLeft = dragState.sl - dx;
    area.scrollTop = dragState.st - dy;
  }
});
window.addEventListener("mouseup", () => { dragState = null; });

// hover tile inspector
const tip = document.getElementById("tip");
cv.addEventListener("mousemove", ev => {
  if (!state || (dragState && dragMoved)) { tip.style.display = "none"; return; }
  const rect = cv.getBoundingClientRect();
  const pos = pixelToHex(ev.clientX - rect.left, ev.clientY - rect.top);
  const t = pos && TMAP.get(key(pos));
  if (!t) { tip.style.display = "none"; return; }
  const k = key(pos);
  const lines = [];
  let head = t.terrain + (t.hills ? " hills" : "");
  if (t.feature) head += " · " + t.feature;
  lines.push("<b>" + head + "</b>");
  if (t.resource)
    lines.push((RES_ICON[t.resource] || "●") + " " + t.resource +
               (RULES && RULES.resources ? " (" + RULES.resources[t.resource].class + ")" : ""));
  if (t.improvement) lines.push("⚒ " + t.improvement.replaceAll("_", " "));
  if (t.district) lines.push("🏗 " + t.district.replaceAll("_", " ") + " district");
  const y = tileYieldFull(t);
  const ystr = Object.entries(y).filter(([, v]) => v > 0)
    .map(([kk, v]) => v + YICON[kk]).join(" ");
  if (ystr && !t.district) lines.push(ystr);
  if (t.owner !== null && t.owner !== undefined)
    lines.push("territory: " + state.players[t.owner].civ);
  const city = state.cities.find(c => c.pos[0] === pos[0] && c.pos[1] === pos[1]);
  if (city) lines.push("🏛 <b>" + city.name + "</b> pop " + city.pop +
                       " (" + state.players[city.owner].civ + ")");
  for (const u of state.units) {
    if (key(u.pos) !== k) continue;
    lines.push("● " + state.players[u.owner].civ + " " + u.type +
               " — " + u.hp + "hp, " + u.moves_left + "mp" +
               (u.level > 1 ? ", lvl " + u.level : "") +
               (u.fortified ? ", fortified" : ""));
  }
  tip.innerHTML = lines.join("<br>");
  tip.style.display = "block";
  tip.style.left = Math.min(ev.clientX + 16, window.innerWidth - 280) + "px";
  tip.style.top = (ev.clientY + 16) + "px";
});
cv.addEventListener("mouseleave", () => { tip.style.display = "none"; });

// display mode
{
  const vs = document.getElementById("viewsel");
  vs.value = VIEW;
  vs.onchange = () => {
    VIEW = vs.value;
    localStorage.setItem("civvis-view", VIEW);
    if (state) drawMap();
  };
}
document.getElementById("newgame").onclick = async () => {
  const np = +document.getElementById("np").value;
  sel = null; selCity = null;
  render(await (await fetch("/new", {method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({num_players: np, seed: Math.floor(Math.random()*1e9)})})).json());
};

loadRules().then(fetchState);
</script>
</body>
